<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Search · Catman · Manutan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --w:#faf9f5;--w2:#f2f0e8;--w3:#e8e4d8;--w4:#d4d0c0;
  --k:#1a1a14;--k2:#48483a;--k3:#7a7a68;--k4:#adad94;
  --bd:rgba(26,26,20,.07);--bd2:rgba(26,26,20,.13);
  --r:8px;--rl:12px;
  --ok:#1e5c00;--ok-bg:#e8f5e0;--ok-bd:rgba(30,92,0,.15);
  --warn:#7a4a00;--warn-bg:#fff3e0;--warn-bd:rgba(122,74,0,.18);
  --alert:#7a1010;--alert-bg:#fdecea;--alert-bd:rgba(122,16,16,.18);
  --trend:#004a7a;--trend-bg:#e4f0fc;--trend-bd:rgba(0,74,122,.18);
  --accent:#c84800;
  --sidebar:260px;
}
html{background:var(--k);font-size:15px;color:var(--k);-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--w);min-height:100vh}

/* ── DESKTOP LAYOUT ── */
.shell{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--k);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  padding:0;
}
.sb-top{padding:28px 24px 24px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,249,245,.3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sb-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.sb-title{font-family:'Fraunces',serif;font-size:26px;font-weight:400;color:var(--w);line-height:1.1;letter-spacing:-.4px}
.sb-title em{font-style:italic;color:rgba(250,249,245,.4)}
.sb-stats{margin-top:16px;display:flex;gap:16px}
.sb-stat{font-size:11px;font-family:'DM Mono',monospace}
.sb-stat-n{color:rgba(250,249,245,.8);font-size:16px;font-weight:500;display:block;line-height:1}
.sb-stat-l{color:rgba(250,249,245,.3);margin-top:2px;display:block}

.sb-nav{padding:16px 12px;flex:1}
.sb-nav-label{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:rgba(250,249,245,.25);padding:0 12px;margin-bottom:6px}
.sb-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:var(--r);
  font-size:13px;color:rgba(250,249,245,.5);
  cursor:pointer;transition:all .1s;border:none;background:none;
  width:100%;text-align:left;font-family:'DM Sans',sans-serif;
  margin-bottom:2px;
}
.sb-nav-item:hover{background:rgba(255,255,255,.07);color:rgba(250,249,245,.8)}
.sb-nav-item.active{background:rgba(255,255,255,.12);color:var(--w);font-weight:500}
.sb-nav-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.sb-nav-count{margin-left:auto;font-size:10px;font-family:'DM Mono',monospace;background:rgba(255,255,255,.08);padding:2px 7px;border-radius:999px;color:rgba(250,249,245,.4)}
.sb-nav-item.active .sb-nav-count{background:rgba(255,255,255,.15);color:rgba(250,249,245,.7)}

.sb-sep{border:none;border-top:1px solid rgba(255,255,255,.06);margin:8px 12px}

.sb-period{padding:16px 24px 20px;border-top:1px solid rgba(255,255,255,.07);margin-top:auto}
.sb-period-label{font-size:10px;font-family:'DM Mono',monospace;color:rgba(250,249,245,.25);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.sb-period-val{font-size:12px;color:rgba(250,249,245,.5)}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{
  background:var(--w);border-bottom:1px solid var(--bd);
  padding:16px 32px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:50;
}
.tb-breadcrumb{font-size:13px;color:var(--k3);display:flex;align-items:center;gap:8px}
.tb-bc-sep{color:var(--k4)}
.tb-bc-current{color:var(--k);font-weight:500}
.tb-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--k3);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;padding:6px 10px;border-radius:var(--r);transition:all .1s}
.tb-back:hover{background:var(--w2);color:var(--k)}
.tb-spacer{flex:1}
.tb-tabs{display:flex;gap:2px;background:var(--w2);border-radius:999px;padding:3px}
.tb-tab{padding:5px 16px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;color:var(--k3);border:none;background:none;transition:all .12s;font-family:'DM Sans',sans-serif}
.tb-tab:hover{color:var(--k)}
.tb-tab.active{background:var(--k);color:var(--w)}

/* PAGE */
.page{padding:32px;flex:1}

/* GRID FAMILLES */
.fam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:4px}
.fam-card{
  background:var(--w);border:1px solid var(--bd);border-radius:var(--rl);
  padding:18px 20px;cursor:pointer;transition:all .12s;
}
.fam-card:hover{border-color:var(--bd2);background:var(--w2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,26,20,.06)}
.fc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.fc-icon{font-size:28px}
.fc-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.fc-nr{font-size:10px;font-family:'DM Mono',monospace;background:var(--alert-bg);color:var(--alert);padding:2px 8px;border-radius:999px}
.fc-trend{font-size:10px;font-family:'DM Mono',monospace;background:var(--trend-bg);color:var(--trend);padding:2px 8px;border-radius:999px}
.fc-name{font-family:'Fraunces',serif;font-size:18px;font-weight:400;color:var(--k);margin-bottom:6px;letter-spacing:-.2px}
.fc-meta{display:flex;align-items:center;gap:10px;font-size:12px;font-family:'DM Mono',monospace;color:var(--k3)}
.fc-disp{font-weight:500}
.disp-ok{color:var(--ok)}
.disp-warn{color:var(--warn)}
.disp-alert{color:var(--alert)}
.fc-bar{width:100%;height:3px;background:var(--w3);border-radius:2px;margin-top:12px}
.fc-bar-fill{height:100%;border-radius:2px}

/* HERO SECTION */
.section-hero{margin-bottom:28px}
.hero-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--k3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.hero-title{font-family:'Fraunces',serif;font-size:32px;font-weight:400;color:var(--k);letter-spacing:-.4px;line-height:1.1;margin-bottom:16px}
.hero-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:560px}
.hkpi{background:var(--w2);border-radius:var(--rl);padding:14px 18px;border:1px solid var(--bd)}
.hkpi-n{font-family:'Fraunces',serif;font-size:26px;font-weight:300;color:var(--k);line-height:1}
.hkpi-l{font-size:10px;color:var(--k3);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.hkpi.accent .hkpi-n{color:var(--accent)}

/* SUBFAM LIST */
.sf-list{display:flex;flex-direction:column;gap:8px}
.sf-card{
  background:var(--w);border:1px solid var(--bd);border-radius:var(--rl);
  padding:14px 18px;cursor:pointer;transition:all .1s;
  display:flex;align-items:center;gap:16px;
}
.sf-card:hover{border-color:var(--bd2);background:var(--w2)}
.sf-bar-v{width:4px;height:40px;background:var(--w3);border-radius:2px;flex-shrink:0}
.sf-bar-fill-v{width:100%;border-radius:2px}
.sf-body{flex:1;min-width:0}
.sf-name{font-size:14px;font-weight:500;color:var(--k);margin-bottom:3px}
.sf-meta{font-size:12px;font-family:'DM Mono',monospace;color:var(--k3);display:flex;gap:10px}
.sf-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.sf-trend-badge{font-size:11px;font-family:'DM Mono',monospace;background:var(--trend-bg);color:var(--trend);padding:3px 10px;border-radius:999px}
.sf-nr-badge{font-size:11px;font-family:'DM Mono',monospace;background:var(--alert-bg);color:var(--alert);padding:3px 10px;border-radius:999px}
.sf-arrow{color:var(--k4);font-size:16px}

/* DETAIL LAYOUT */
.detail-layout{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
@media(max-width:1100px){.detail-layout{grid-template-columns:1fr}}

/* DEMAND SECTIONS */
.demand-block{background:var(--w);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:16px}
.db-header{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--bd);background:var(--w2)}
.db-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.db-dot.covered{background:var(--trend)}
.db-dot.uncovered{background:var(--alert)}
.db-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--k2)}
.db-count{margin-left:auto;font-size:11px;font-family:'DM Mono',monospace;color:var(--k4)}
.db-cols{display:grid;grid-template-columns:1fr 60px 80px 80px 60px;gap:0;padding:8px 18px 4px;font-size:10px;font-family:'DM Mono',monospace;color:var(--k4);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bd)}

.term-row{
  display:grid;grid-template-columns:1fr 60px 80px 80px 60px;
  align-items:center;gap:0;padding:10px 18px;
  border-bottom:1px solid var(--bd);transition:background .08s;
}
.term-row:last-child{border-bottom:none}
.term-row:hover{background:var(--w2)}
.term-name{font-size:13px;font-weight:500;color:var(--k)}
.term-vol{font-size:12px;font-family:'DM Mono',monospace;color:var(--k2)}
.term-bar-cell{display:flex;align-items:center;gap:6px}
.term-bar{flex:1;height:4px;background:var(--w3);border-radius:2px}
.term-bar-fill{height:100%;border-radius:2px}
.tbd-ok{background:#60a830}
.tbd-warn{background:#d4880a}
.tbd-alert{background:#c03020}
.term-pct-cell{font-size:12px;font-family:'DM Mono',monospace;text-align:right}
.up{color:var(--ok)}
.dn{color:var(--alert)}
.mu{color:var(--k4)}
.term-conv{font-size:11px;font-family:'DM Mono',monospace;color:var(--k3);text-align:right}

.nr-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 18px;border-bottom:1px solid var(--alert-bd);
  background:var(--alert-bg);
}
.nr-row:last-child{border-bottom:none}
.nr-icon{color:var(--alert);font-size:12px;flex-shrink:0}
.nr-name{font-size:13px;color:var(--alert);font-style:italic;flex:1}
.nr-vol{font-size:11px;font-family:'DM Mono',monospace;color:var(--alert);opacity:.7}

/* SIGNALS CARD */
.signals-card{background:var(--k);border-radius:var(--rl);padding:20px 22px;position:sticky;top:80px}
.sc-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sc-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,249,245,.3)}
.sc-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);display:block;margin-left:8px}
.signal-item{margin-bottom:10px}
.signal-item:last-child{margin-bottom:0}
.sig-text{font-size:12.5px;line-height:1.65;color:rgba(250,249,245,.8);font-weight:300;padding:12px 14px;background:rgba(255,255,255,.05);border-radius:var(--r);border-left:2px solid rgba(250,249,245,.12)}
.sig-text strong{font-weight:600;color:var(--w)}
.sig-trend{border-left-color:rgba(200,72,0,.7);background:rgba(200,72,0,.08)}
.sig-loading{display:flex;align-items:center;gap:8px;color:rgba(250,249,245,.3);font-size:12px;padding:4px 0}
.sig-ld-dot{width:5px;height:5px;border-radius:50%;background:rgba(250,249,245,.3);animation:blink 1.2s ease infinite}
.sig-ld-dot:nth-child(2){animation-delay:.2s}
.sig-ld-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

/* ALERTS + TRENDS */
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.list-card{
  background:var(--w);border:1px solid var(--bd);border-radius:var(--rl);
  padding:14px 16px;cursor:pointer;transition:all .1s;
  display:flex;align-items:center;gap:12px;
}
.list-card:hover{border-color:var(--bd2);background:var(--w2)}
.lc-icon{font-size:22px;width:40px;height:40px;background:var(--w2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lc-body{flex:1;min-width:0}
.lc-name{font-size:13px;font-weight:500;color:var(--k);margin-bottom:2px}
.lc-sub{font-size:11px;color:var(--k3);margin-bottom:4px}
.lc-terms{font-size:11px;color:var(--alert);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lc-right{flex-shrink:0}
.badge-alert{font-size:11px;font-family:'DM Mono',monospace;background:var(--alert-bg);color:var(--alert);padding:3px 10px;border-radius:999px}
.badge-trend{font-size:11px;font-family:'DM Mono',monospace;background:var(--trend-bg);color:var(--trend);padding:3px 10px;border-radius:999px}
.badge-disp{font-size:11px;font-family:'DM Mono',monospace;color:var(--k3)}

/* PAGE HEADER */
.page-header{margin-bottom:24px}
.ph-title{font-family:'Fraunces',serif;font-size:28px;font-weight:400;color:var(--k);letter-spacing:-.3px}
.ph-sub{font-size:13px;color:var(--k3);margin-top:4px;font-family:'DM Mono',monospace}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--k3);font-size:13px}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none}
  .topbar{padding:12px 16px}
  .page{padding:16px}
  .fam-grid{grid-template-columns:1fr}
  .hero-kpis{grid-template-columns:repeat(3,1fr)}
  .detail-layout{grid-template-columns:1fr}
  .signals-card{position:static}
  .db-cols{display:none}
  .term-row{grid-template-columns:1fr 50px 70px 50px;gap:0}
  .term-conv{display:none}
  .ph-title{font-size:22px}
  .mobile-nav{display:flex}
}

/* MOBILE NAV */
.mobile-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--w);border-top:1px solid var(--bd);
  z-index:100;padding-bottom:env(safe-area-inset-bottom,0);
}
.mn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 7px;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
.mn-icon{font-size:18px;line-height:1}
.mn-label{font-size:10px;font-weight:500;color:var(--k3)}
.mn-item.active .mn-label{color:var(--k)}

/* MOBILE TOPBAR */
.mobile-header{
  display:none;background:var(--k);
  padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 14px;
  position:sticky;top:0;z-index:100;
}
@media(max-width:768px){
  .mobile-header{display:flex;align-items:center;justify-content:space-between}
  body{padding-bottom:60px}
}
.mh-title{font-family:'Fraunces',serif;font-size:18px;font-weight:400;color:var(--w)}
.mh-title em{font-style:italic;color:rgba(250,249,245,.4)}
.mh-right{font-size:11px;font-family:'DM Mono',monospace;color:rgba(250,249,245,.35)}

/* Tab views */
.tab-view{display:none}
.tab-view.active{display:block}
</style>
</head>
<body>

<!-- MOBILE HEADER -->
<div class="mobile-header" id="mobile-header">
  <div class="mh-title">Signal <em>Search</em></div>
  <div class="mh-right" id="mh-period">Manutan FR · Avr. 2026</div>
</div>

<div class="shell">

  <!-- SIDEBAR (desktop) -->
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-eyebrow"><span class="sb-dot"></span>Manutan Group</div>
      <div class="sb-title">Signal<br><em>Search</em></div>
      <div class="sb-stats">
        <div class="sb-stat">
          <span class="sb-stat-n" id="sb-vol">—</span>
          <span class="sb-stat-l">recherches</span>
        </div>
        <div class="sb-stat">
          <span class="sb-stat-n" id="sb-fam">—</span>
          <span class="sb-stat-l">univers</span>
        </div>
        <div class="sb-stat">
          <span class="sb-stat-n" id="sb-nr">—</span>
          <span class="sb-stat-l">non couverts</span>
        </div>
      </div>
    </div>

    <div class="sb-nav">
      <div class="sb-nav-label">Navigation</div>
      <button class="sb-nav-item active" id="snav-univers" onclick="setView('univers')">
        <span class="sb-nav-icon">◈</span> Univers
        <span class="sb-nav-count" id="snav-univers-count">—</span>
      </button>
      <button class="sb-nav-item" id="snav-alertes" onclick="setView('alertes')">
        <span class="sb-nav-icon">⚑</span> Trous d'offre
        <span class="sb-nav-count" id="snav-alertes-count">—</span>
      </button>
      <button class="sb-nav-item" id="snav-tendances" onclick="setView('tendances')">
        <span class="sb-nav-icon">↑</span> Tendances
        <span class="sb-nav-count" id="snav-tendances-count">—</span>
      </button>
    </div>

    <div class="sb-period">
      <div class="sb-period-label">Période</div>
      <div class="sb-period-val">Avril 2026 · FR</div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar" id="topbar">
      <div class="tb-breadcrumb" id="breadcrumb">
        <span class="tb-bc-current">Univers</span>
      </div>
      <div class="tb-spacer"></div>
      <div class="tb-tabs" id="tb-tabs" style="display:none">
        <button class="tb-tab active" onclick="setView('univers')">Univers</button>
        <button class="tb-tab" onclick="setView('alertes')">Alertes</button>
        <button class="tb-tab" onclick="setView('tendances')">Tendances</button>
      </div>
    </div>

    <div class="page">

      <!-- VIEW: UNIVERS -->
      <div class="tab-view active" id="view-univers">

        <!-- Families list -->
        <div id="panel-families">
          <div class="page-header">
            <div class="ph-title">Vos univers</div>
            <div class="ph-sub" id="fam-sub">—</div>
          </div>
          <div class="fam-grid" id="fam-grid"></div>
        </div>

        <!-- Subfamilies list -->
        <div id="panel-subfamilies" style="display:none">
          <div class="section-hero" id="fam-hero"></div>
          <div class="sf-list" id="sf-list"></div>
        </div>

        <!-- Detail -->
        <div id="panel-detail" style="display:none">
          <div class="section-hero" id="sf-hero-block"></div>
          <div class="detail-layout">
            <div id="demand-left"></div>
            <div>
              <div class="signals-card" id="signals-card">
                <div class="sc-header"><div class="sc-label">Signaux catman</div></div>
                <div class="sig-loading" id="sig-loading">
                  <div class="sig-ld-dot"></div><div class="sig-ld-dot"></div><div class="sig-ld-dot"></div>
                  <span style="font-size:12px;color:rgba(250,249,245,.3)">Analyse en cours…</span>
                </div>
                <div id="signals-content"></div>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- VIEW: ALERTES -->
      <div class="tab-view" id="view-alertes">
        <div class="page-header">
          <div class="ph-title">Trous d'offre</div>
          <div class="ph-sub" id="alert-sub">—</div>
        </div>
        <div class="list-grid" id="alert-grid"></div>
      </div>

      <!-- VIEW: TENDANCES -->
      <div class="tab-view" id="view-tendances">
        <div class="page-header">
          <div class="ph-title">Signaux de croissance</div>
          <div class="ph-sub" id="trend-sub">—</div>
        </div>
        <div class="list-grid" id="trend-grid"></div>
      </div>

    </div>
  </div>
</div>

<!-- MOBILE NAV -->
<nav class="mobile-nav" id="mobile-nav">

// ── STATE ──────────────────────────────────────────────────────────────────────
let S = { view:'univers', panel:'families', fam:null, sf:null, signals:{} };

const dispCls = d => d>=0.6?'disp-alert':d>=0.48?'disp-warn':'disp-ok';
const barCls = d => d>=0.6?'tbd-alert':d>=0.45?'tbd-warn':'tbd-ok';
const pct = v => v==null?'—':`${v>0?'+':''}${(v*100).toFixed(0)}%`;
const pctCls = v => v>0.05?'up':v<-0.05?'dn':'mu';

function totalVol(){ return Object.values(DATA).reduce((s,f)=>s+f.v,0); }
function totalNR(){ return Object.values(DATA).reduce((s,f)=>s+f.nr_total,0); }

function init(){
  const tv = totalVol(), tf = Object.keys(DATA).length, tn = totalNR();
  document.getElementById('sb-vol').textContent = tv.toLocaleString('fr');
  document.getElementById('sb-fam').textContent = tf;
  document.getElementById('sb-nr').textContent = tn;
  document.getElementById('snav-univers-count').textContent = tf;
  renderFamilies();
  renderAlerts();
  renderTrends();
}

// ── FAMILIES ──────────────────────────────────────────────────────────────────
function renderFamilies(){
  const fams = Object.entries(DATA).sort((a,b)=>b[1].v-a[1].v);
  document.getElementById('fam-sub').textContent = `${fams.length} univers · ${totalVol().toLocaleString('fr')} recherches · Avril 2026 FR`;
  document.getElementById('fam-grid').innerHTML = fams.map(([name,fd])=>{
    const trends = Object.values(fd.subfams).filter(sf=>sf.trend).sort((a,b)=>b.trend.pct-a.trend.pct);
    const topTrend = trends[0];
    const fillW = Math.round(fd.d*100);
    const bc = fd.d>=0.6?'#c03020':fd.d>=0.48?'#d4880a':'#60a830';
    return `<div class="fam-card" onclick="openFamily('${name.replace(/'/g,"\\'")}')">
      <div class="fc-top">
        <div class="fc-icon">${fd.icon}</div>
        <div class="fc-badges">
          ${fd.nr_total>0?`<span class="fc-nr">⊘ ${fd.nr_total} non couverts</span>`:''}
          ${topTrend?`<span class="fc-trend">↑ ${topTrend.trend.t}</span>`:''}
        </div>
      </div>
      <div class="fc-name">${name}</div>
      <div class="fc-meta">
        <span>${fd.v.toLocaleString('fr')} rech.</span>
        <span>·</span>
        <span class="fc-disp ${dispCls(fd.d)}">${(fd.d*100).toFixed(1)}% disp.</span>
        <span>·</span>
        <span>${Object.keys(fd.subfams).length} sous-familles</span>
      </div>
      <div class="fc-bar"><div class="fc-bar-fill" style="width:${fillW}%;background:${bc}"></div></div>
    </div>`;
  }).join('');
}

function openFamily(name){
  S.fam = name; S.panel = 'subfamilies';
  const fd = DATA[name];
  setBreadcrumb([{label:'Univers',fn:'showPanel("families")'},name]);
  document.getElementById('fam-hero').innerHTML = `
    <div class="hero-label">${fd.icon} Univers</div>
    <div class="hero-title">${name}</div>
    <div class="hero-kpis">
      <div class="hkpi"><div class="hkpi-n">${fd.v.toLocaleString('fr')}</div><div class="hkpi-l">Recherches</div></div>
      <div class="hkpi accent"><div class="hkpi-n">${(fd.d*100).toFixed(1)}%</div><div class="hkpi-l">Dispersion moy.</div></div>
      <div class="hkpi"><div class="hkpi-n">${fd.nr_total}</div><div class="hkpi-l">Non couverts</div></div>
    </div>`;
  document.getElementById('sf-list').innerHTML = Object.entries(fd.subfams).sort((a,b)=>b[1].v-a[1].v).map(([sfn,sf])=>{
    const fillH = Math.round(sf.d*100);
    const bc = sf.d>=0.6?'#c03020':sf.d>=0.48?'#d4880a':'#60a830';
    return `<div class="sf-card" onclick="openDetail('${name.replace(/'/g,"\\'")}','${sfn.replace(/'/g,"\\'")}')">
      <div class="sf-bar-v"><div class="sf-bar-fill-v" style="height:${fillH}%;background:${bc}"></div></div>
      <div class="sf-body">
        <div class="sf-name">${sfn}</div>
        <div class="sf-meta">
          <span>${sf.v.toLocaleString('fr')} rech.</span>
          <span class="${dispCls(sf.d)}">${(sf.d*100).toFixed(1)}% disp.</span>
        </div>
      </div>
      <div class="sf-right">
        ${sf.trend?`<span class="sf-trend-badge">↑ ${pct(sf.trend.pct)}</span>`:''}
        ${sf.nr.length>0?`<span class="sf-nr-badge">⊘ ${sf.nr.length}</span>`:''}
        <span class="sf-arrow">›</span>
      </div>
    </div>`;
  }).join('');
  showPanel('subfamilies');
}

function openDetail(famName, sfName){
  S.fam=famName; S.sf=sfName; S.panel='detail';
  const sf = DATA[famName].subfams[sfName];
  setBreadcrumb([{label:'Univers',fn:'showPanel("families")'},{label:famName,fn:`openFamily('${famName.replace(/'/g,"\\'")}')`},sfName]);

      <div class="hkpi"><div class="hkpi-n">${sf.v.toLocaleString('fr')}</div><div class="hkpi-l">Recherches</div></div>

      <div class="hkpi"><div class="hkpi-n" style="color:var(--alert)">${sf.nr.length}</div><div class="hkpi-l">Non couverts</div></div>
    </div>`;

  const maxV = sf.terms[0]?.v||1;
  const covHtml = `
    <div class="demand-block">
      <div class="db-header">
        <span class="db-dot covered"></span>
        <span class="db-title">Demande active — termes avec résultats</span>
        <span class="db-count">${sf.terms.length} termes</span>
      </div>
      <div class="db-cols"><span>Terme</span><span>Vol.</span><span>Dispersion</span><span>Évol. N-1</span><span>Conv.</span></div>
      ${sf.terms.map(t=>`
        <div class="term-row">
          <span class="term-name">${t.t}</span>
          <span class="term-vol">${t.v}</span>
          <div class="term-bar-cell">
            <div class="term-bar"><div class="term-bar-fill ${barCls(t.d)}" style="width:${Math.round(t.d*100)}%"></div></div>
            <span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--k3);width:30px;flex-shrink:0">${(t.d*100).toFixed(0)}%</span>
          </div>
          <span class="term-pct-cell ${pctCls(t.pct)}">${pct(t.pct)}</span>
          <span class="term-conv">${(t.cr*100).toFixed(1)}%</span>
        </div>`).join('')}
    </div>`;

  const nrHtml = `
    <div class="demand-block">
      <div class="db-header" style="background:var(--alert-bg)">
        <span class="db-dot uncovered"></span>
        <span class="db-title" style="color:var(--alert)">Demande non couverte — no result</span>
        <span class="db-count">${sf.nr.length} termes</span>
      </div>
      ${sf.nr.length===0
        ?'<div class="empty" style="padding:1.5rem">✓ Aucun terme sans résultat</div>'
        :sf.nr.map(nr=>`<div class="nr-row"><span class="nr-icon">⊘</span><span class="nr-name">${nr.t}</span><span class="nr-vol">${nr.v} rech.</span></div>`).join('')}
    </div>`;

  document.getElementById('demand-left').innerHTML = covHtml + nrHtml;
  showPanel('detail');
  generateSignals(famName, sfName, sf);
}

function showPanel(p){
  S.panel=p;
  ['families','subfamilies','detail'].forEach(id=>{
    document.getElementById(`panel-${id}`).style.display = id===p?'block':'none';
  });
  window.scrollTo(0,0);
}

// ── SIGNALS ───────────────────────────────────────────────────────────────────
async function generateSignals(famName, sfName, sf){
  const key = `${famName}::${sfName}`;
  document.getElementById('sig-loading').style.display='flex';
  document.getElementById('signals-content').innerHTML='';
  if(S.signals[key]){renderSignals(S.signals[key]);return;}
  const top = sf.terms.slice(0,5).map(t=>`${t.t} (${t.v} rech, disp ${(t.d*100).toFixed(0)}%, ${pct(t.pct)})`).join('; ');
  const nr = sf.nr.slice(0,4).map(t=>t.t).join(', ')||'aucun';
  const trend = sf.trend?`hausse forte: ${sf.trend.t} (${pct(sf.trend.pct)})`:'aucun';
  const prompt = `Tu es catégorie manager B2B eMerchandising. Analyse pour la sous-famille "${sfName}" (univers ${famName}).
Termes: ${top}
Sans résultat: ${nr}
Tendance: ${trend}
Dispersion moy: ${(sf.d*100).toFixed(1)}%

Génère 3 signaux actionnables courts (1-2 phrases). Direct, style catman. Distingue trous d'offre, problèmes contenu, opportunités croissance. Pas de titre. Gras pour termes clés. Séparés par ligne vide. Français.`;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})});
    const data = await res.json();
    const text = data.content?.find(b=>b.type==='text')?.text||'';
    S.signals[key]=text; renderSignals(text);
  }catch(e){
    const fb = buildFB(sfName,sf); S.signals[key]=fb; renderSignals(fb);
  }
}

function buildFB(sfName,sf){
  const lines=[];
  const u=sf.terms.filter(t=>t.d>0.6&&t.v>50);
  if(u.length) lines.push(`**${u[0].t}** (disp. ${(u[0].d*100).toFixed(0)}%) — fort volume sans bonne réponse. Le contenu produit couvre-t-il bien l'intention ?`);
  if(sf.nr.length>0) lines.push(`**Demande non couverte** : ${sf.nr.slice(0,2).map(t=>t.t).join(', ')} — ${sf.nr.slice(0,2).reduce((s,t)=>s+t.v,0)} recherches sans résultat. Vérifier l'assortiment.`);
  if(sf.trend) lines.push(`**${sf.trend.t}** : +${(sf.trend.pct*100).toFixed(0)}% de recherches — signal de montée en demande à intégrer dans le plan d'achat.`);
  if(lines.length<2) lines.push(`Dispersion de **${(sf.d*100).toFixed(1)}%** — aligner les intitulés produits avec les termes de recherche clients.`);
  return lines.join('\n\n');
}

function renderSignals(text){
  document.getElementById('sig-loading').style.display='none';
  const sigs = text.split(/\n\n+/).filter(s=>s.trim().length>10);
  const isTrend = s => s.includes('%')&&(s.includes('hausse')||s.includes('croissance')||s.includes('+'));
  document.getElementById('signals-content').innerHTML = sigs.slice(0,4).map(sig=>`
    <div class="signal-item">
      <div class="sig-text ${isTrend(sig)?'sig-trend':''}">${sig.trim().replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>
    </div>`).join('');
}

// ── ALERTS ────────────────────────────────────────────────────────────────────
function renderAlerts(){
  const alerts=[];
  for(const[fn,fd] of Object.entries(DATA))
    for(const[sfn,sf] of Object.entries(fd.subfams))
      if(sf.nr.length>0) alerts.push({fn,sfn,icon:fd.icon,nr:sf.nr});
  alerts.sort((a,b)=>b.nr.length-a.nr.length);
  const total = alerts.reduce((s,a)=>s+a.nr.length,0);
  document.getElementById('alert-sub').textContent=`${total} termes sans résultat sur ${alerts.length} sous-familles`;
  document.getElementById('snav-alertes-count').textContent=total;
  document.getElementById('alert-grid').innerHTML=alerts.slice(0,24).map(a=>`
    <div class="list-card" onclick="openDetail('${a.fn.replace(/'/g,"\\'")}','${a.sfn.replace(/'/g,"\\'")}');setView('univers')">
      <div class="lc-icon">${a.icon}</div>
      <div class="lc-body">
        <div class="lc-name">${a.sfn}</div>
        <div class="lc-sub">${a.fn}</div>
        <div class="lc-terms">${a.nr.slice(0,3).map(t=>t.t).join(' · ')}</div>
      </div>
      <div class="lc-right"><span class="badge-alert">⊘ ${a.nr.length}</span></div>
    </div>`).join('');
}

// ── TRENDS ────────────────────────────────────────────────────────────────────
function renderTrends(){
  const trends=[];
  const seen=new Set();
  for(const[fn,fd] of Object.entries(DATA))
    for(const[sfn,sf] of Object.entries(fd.subfams)){
      if(sf.trend&&sf.trend.pct>0.5&&!seen.has(sf.trend.t)){seen.add(sf.trend.t);trends.push({fn,sfn,icon:fd.icon,trend:sf.trend,d:sf.d});}
      sf.terms.filter(t=>t.pct>1&&t.v>30&&!seen.has(t.t)).forEach(t=>{seen.add(t.t);trends.push({fn,sfn,icon:fd.icon,trend:{t:t.t,pct:t.pct},d:sf.d,tv:t.v});});
    }
  trends.sort((a,b)=>b.trend.pct-a.trend.pct);
  document.getElementById('trend-sub').textContent=`${trends.length} signaux de croissance détectés`;
  document.getElementById('snav-tendances-count').textContent=trends.length;
  document.getElementById('trend-grid').innerHTML=trends.slice(0,24).map(t=>`
    <div class="list-card" onclick="openDetail('${t.fn.replace(/'/g,"\\'")}','${t.sfn.replace(/'/g,"\\'")}');setView('univers')">
      <div class="lc-icon">${t.icon}</div>
      <div class="lc-body">
        <div class="lc-name">${t.trend.t}</div>
        <div class="lc-sub">${t.sfn} · ${t.fn}</div>
        ${t.tv?`<div class="lc-sub" style="color:var(--k4)">${t.tv} recherches</div>`:''}
      </div>
      <div class="lc-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="badge-trend">↑ ${pct(t.trend.pct)}</span>
        <span class="badge-disp">${(t.d*100).toFixed(0)}% disp.</span>
      </div>
    </div>`).join('');
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function setView(v){
  S.view=v;
  document.querySelectorAll('.tab-view').forEach(el=>el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  ['univers','alertes','tendances'].forEach(id=>{
    document.getElementById(`snav-${id}`)?.classList.toggle('active',id===v);
    document.getElementById(`mn-${id}`)?.classList.toggle('active',id===v);
  });
  if(v==='univers') setBreadcrumb([S.panel==='families'?{label:'Univers'}:S.panel==='subfamilies'?{label:S.fam}:{label:S.sf}]);
  else setBreadcrumb([{label:v.charAt(0).toUpperCase()+v.slice(1)}]);
}

function setBreadcrumb(parts){
  const el = document.getElementById('breadcrumb');
  el.innerHTML = parts.map((p,i)=>{
    if(i===parts.length-1) return `<span class="tb-bc-current">${p.label||p}</span>`;
    return `<span style="cursor:pointer;color:var(--k3)" onclick="${p.fn||''}">${p.label||p}</span><span class="tb-bc-sep">›</span>`;
  }).join('');
}

window.setView=setView; window.openFamily=openFamily; window.openDetail=openDetail; window.showPanel=showPanel;
init();
</script>
