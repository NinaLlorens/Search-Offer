function dc(d){return d<0.45?'ok':d<=0.5?'neutral':d<=0.6?'warn':'alert'}
function bc(d){const c=dc(d);return c==='ok'?'bok':c==='neutral'?'bneutral':c==='warn'?'bwarn':'balert'}
function chip(d,cls='dc'){return '<span class="'+cls+' '+dc(d)+'">'+(d*100).toFixed(1)+'%</span>'}
function ev(pct){if(Math.abs(pct)<0.05)return '<span class="ef">—</span>';const s=pct>0?'+':'',c=pct>0?'eu':'ed';return '<span class="'+c+'">'+s+(pct*100).toFixed(0)+'%</span>'}
function esc(s){return s.replace(/'/g,"\\'")}
let S={lv:'home',fam:null,sf:null}

function buildNav(){
  const tv=Object.values(D).reduce((s,f)=>s+f.v,0)
  const tn=Object.values(D).reduce((s,f)=>s+f.nr_total,0)
  document.getElementById('sb-vol').textContent=tv.toLocaleString('fr')
  document.getElementById('sb-nr').textContent=tn
  document.getElementById('sb-nav').innerHTML=Object.entries(D).map(([fn,fd])=>{
    return '<button class="sb-ni'+(S.fam===fn?' active':'')+'" onclick="gF(\''+esc(fn)+'\')">'
      +'<span class="sb-icon">'+fd.icon+'</span>'
      +'<span class="sb-nl">'+fn+'</span>'
      +'<span class="sb-nd '+dc(fd.d)+'">'+(fd.d*100).toFixed(0)+'%</span>'
      +'</button>'
  }).join('')
}

function bc_set(parts){
  document.getElementById('bc').innerHTML=parts.map((p,i)=>{
    const last=i===parts.length-1
    if(last) return '<span class="bci cur">'+p.l+'</span>'
    return '<button class="bci" onclick="'+p.a+'">'+p.l+'</button><span class="bcs">›</span>'
  }).join('')
}

function home(){
  S={lv:'home',fam:null,sf:null}
  buildNav()
  bc_set([{l:'Accueil'}])
  const html=Object.entries(D).map(([fn,fd])=>{
    return '<div class="fc" onclick="gF(\''+esc(fn)+'\')">'
      +'<div class="fc-top"><div class="fc-icon">'+fd.icon+'</div>'
      +(fd.nr_total>0?'<span class="fc-nr">⊘ '+fd.nr_total+' no result</span>':'')+'</div>'
      +'<div class="fc-name">'+fn+'</div>'
      +'<div class="fc-row"><span class="fc-vol">'+fd.v.toLocaleString('fr')+' rech.</span>'+chip(fd.d)+'</div>'
      +'<div class="fc-kw">'+fd.top_terms.join(' · ')+'</div>'
      +'<div class="fc-bar"><div class="fc-barf '+bc(fd.d)+'" style="width:'+Math.round(fd.d*100)+'%"></div></div>'
      +'</div>'
  }).join('')
  document.getElementById('pg').innerHTML='<div class="ph"><div class="ptitle" style="font-size:24px;margin-bottom:3px">Univers produit</div><div style="font-size:11px;font-family:\'DM Mono\',monospace;color:var(--ink3)">8 familles · Avril 2026 · FR</div></div><div class="fg">'+html+'</div>'
}

function fam(fn){
  S={lv:'fam',fam:fn,sf:null}
  buildNav()
  bc_set([{l:'Accueil',a:'home()'},{l:fn}])
  const fd=D[fn]
  const sfh=Object.entries(fd.subfams).sort((a,b)=>b[1].v-a[1].v).map(([sfn,sf])=>{
    return '<div class="sfi" onclick="gSf(\''+esc(fn)+'\',\''+esc(sfn)+'\')">'
      +'<div class="sfbv"><div class="sfbvf '+bc(sf.d)+'" style="height:'+Math.round(sf.d*100)+'%"></div></div>'
      +'<div class="sfb"><div class="sfn">'+sfn+'</div>'
      +'<div class="sfm"><span>'+sf.v.toLocaleString('fr')+' rech.</span><span>·</span><span>'+sf.terms.length+' termes</span></div></div>'
      +'<div class="sfr"><span class="sfdc '+dc(sf.d)+'">'+(sf.d*100).toFixed(1)+'%</span>'
      +(sf.nr.length>0?'<span class="sfnr">⊘ '+sf.nr.length+'</span>':'')
      +'<span class="sfarr">›</span></div></div>'
  }).join('')
  document.getElementById('pg').innerHTML='<div class="ph" style="display:flex;align-items:flex-start;gap:11px">'
    +'<span style="font-size:34px;line-height:1">'+fd.icon+'</span>'
    +'<div><div class="ptitle">'+fn+'</div>'
    +'<div style="display:flex;align-items:center;gap:9px;margin-top:6px">'
    +'<span style="font-size:12px;font-family:\'DM Mono\',monospace;color:var(--ink3)">'+fd.v.toLocaleString('fr')+' rech.</span>'
    +chip(fd.d)
    +(fd.nr_total>0?'<span class="fc-nr">⊘ '+fd.nr_total+' no result</span>':'')
    +'</div></div></div>'
    +'<div class="sf-list">'+sfh+'</div>'
}

function sf(fn,sfn){
  S={lv:'sf',fam:fn,sf:sfn}
  buildNav()
  bc_set([{l:'Accueil',a:'home()'},{l:fn,a:'gF(\''+esc(fn)+'\')'},{l:sfn}])
  const fd=D[fn],sf=fd.subfams[sfn]
  const terms=sf.terms.filter(t=>t.t.length>2&&!/^[a-z]{1,3}$/.test(t.t)&&t.t!=='eau')
  const nrs=sf.nr.filter(t=>t.t.length>2&&t.t!=='a')
  const trh=terms.map(t=>{
    const hot=t.pct>0.5&&t.v>30
    return '<div class="tr">'
      +'<div class="tn">'+t.t+(hot?'<span class="thot">↑'+(t.pct*100).toFixed(0)+'%</span>':'')+'</div>'
      +'<div class="vc"><span class="vn">'+t.v+'</span><span class="vev">'+ev(t.pct)+'</span></div>'
      +'<div class="dcc"><div class="dbar"><div class="dbarf '+bc(t.d)+'" style="width:'+Math.round(t.d*100)+'%"></div></div>'
      +'<span class="dpct" style="color:'+(t.d>=0.6?'var(--r)':t.d>=0.5?'var(--o)':t.d<0.45?'var(--g)':'var(--ink3)')+'">'+Math.round(t.d*100)+'%</span></div>'
      +'<div class="ccv">'+(t.cr*100).toFixed(1)+'%</div>'
      +'</div>'
  }).join('')
  const nrh=nrs.length===0?'<div class="nr-em">✓ Aucun terme sans résultat</div>'
    :nrs.map(nr=>'<div class="nr-row"><span class="nr-ic">⊘</span><span class="nr-nm">'+nr.t+'</span><span class="nr-vl">'+nr.v+' rech.</span></div>').join('')
  const dc2=dc(sf.d)
  document.getElementById('pg').innerHTML=
    '<div class="ph">'
    +'<div style="font-size:11px;font-family:\'DM Mono\',monospace;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">'+fd.icon+' '+fn+'</div>'
    +'<div class="ptitle">'+sfn+'</div></div>'
    +'<div class="krow">'
    +'<div class="kb"><div class="kn">'+sf.v.toLocaleString('fr')+'</div><div class="kl">Recherches</div></div>'
    +'<div class="kb" style="border-color:'+(sf.d>=0.6?'var(--r-bd)':sf.d>=0.5?'var(--o-bd)':sf.d<0.45?'var(--g-bd)':'var(--bd)')+'"><div class="kn" style="color:'+(sf.d>=0.6?'var(--r)':sf.d>=0.5?'var(--o)':sf.d<0.45?'var(--g)':'var(--ink)')+'">'+((sf.d)*100).toFixed(1)+'%</div><div class="kl">Dispersion</div></div>'
    +'<div class="kb" style="background:var(--r-bg);border-color:var(--r-bd)"><div class="kn" style="color:var(--r)">'+nrs.length+'</div><div class="kl" style="color:var(--r)">No result</div></div>'
    +'</div>'
    +'<div class="dgrid">'
    +'<div class="blk"><div class="bh"><span class="bhdot t"></span><span class="bhtit">Termes avec résultats</span><span class="bhct">'+terms.length+'</span></div>'
    +'<div class="colh"><span>Terme</span><span style="text-align:right">Vol. &nbsp;N-1</span><span>Dispersion</span><span style="text-align:right">Conv.</span></div>'
    +trh+'</div>'
    +'<div class="blk"><div class="bh" style="background:var(--r-bg)"><span class="bhdot n"></span><span class="bhtit" style="color:var(--r)">No result</span><span class="bhct">'+nrs.length+'</span></div>'
    +nrh+'</div>'
    +'</div>'
}

function gF(fn){fam(fn);window.scrollTo(0,0)}
function gSf(fn,sfn){sf(fn,sfn);window.scrollTo(0,0)}
function toggleTheme(){
  const h=document.documentElement,dark=h.getAttribute('data-theme')==='dark'
  h.setAttribute('data-theme',dark?'light':'dark')
  document.getElementById('th-icon').textContent=dark?'◑':'○'
  document.getElementById('th-label').textContent=dark?'Mode sombre':'Mode clair'
}
window.home=home;window.gF=gF;window.gSf=gSf;window.toggleTheme=toggleTheme;
home();
</script>
