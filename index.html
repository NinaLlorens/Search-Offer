<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Search &middot; Pilote eMerch &middot; Manutan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="light"]{--bg:#faf9f5;--bg2:#f2f0e8;--bg3:#e8e4d8;--ink:#1a1a14;--ink2:#48483a;--ink3:#7a7a68;--ink4:#adad94;--bd:rgba(26,26,20,.07);--bd2:rgba(26,26,20,.14);--sb-bg:#1a1a14;--sb-ink:rgba(250,249,245,.9);--sb-ink2:rgba(250,249,245,.4);--sb-ink3:rgba(250,249,245,.18);--card:#faf9f5;--card-h:#f2f0e8}
[data-theme="dark"]{--bg:#111108;--bg2:#1a1a10;--bg3:#242418;--ink:#f0efe8;--ink2:#b8b6a8;--ink3:#808070;--ink4:#585848;--bd:rgba(240,239,232,.07);--bd2:rgba(240,239,232,.14);--sb-bg:#080806;--sb-ink:rgba(240,239,232,.9);--sb-ink2:rgba(240,239,232,.4);--sb-ink3:rgba(240,239,232,.15);--card:#1a1a10;--card-h:#242418}
:root{--g:#1a5200;--g-bg:#e4f0d8;--g-bd:rgba(26,82,0,.15);--o:#7a4400;--o-bg:#fff0e0;--o-bd:rgba(122,68,0,.18);--r:#7a1010;--r-bg:#fdecea;--r-bd:rgba(122,16,16,.18);--b:#003d7a;--b-bg:#e4eefa;--b-bd:rgba(0,61,122,.15);--n:#4a4a3a;--n-bg:#f0ede4;--n-bd:rgba(74,74,58,.15);--acc:#c84800;--sw:248px;--th:52px}
html{font-size:14px;-webkit-font-smoothing:antialiased;background:var(--bg)}
body{font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100vh;transition:background .2s,color .2s}
.shell{display:grid;grid-template-columns:var(--sw) 1fr;min-height:100vh}
.sidebar{background:var(--sb-bg);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;transition:background .2s}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid var(--sb-ink3)}
.sb-pilot{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--sb-ink3);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.sb-pdot{width:6px;height:6px;border-radius:50%;background:var(--acc);flex-shrink:0}
.sb-title{font-family:'Fraunces',serif;font-size:22px;font-weight:400;line-height:1.1;letter-spacing:-.3px}
.sb-title span{color:var(--sb-ink)}.sb-title em{font-style:italic;color:var(--sb-ink2)}
.sb-period{font-size:10px;font-family:'DM Mono',monospace;color:var(--sb-ink3);margin-top:7px}
.country-btns{display:flex;gap:4px;padding:10px 18px;border-bottom:1px solid var(--sb-ink3)}
.cb{flex:1;padding:6px 4px;border-radius:6px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;cursor:pointer;border:1px solid var(--sb-ink3);background:transparent;color:var(--sb-ink2);transition:all .12s;text-align:center}
.cb:hover{background:rgba(255,255,255,.08);color:var(--sb-ink)}
.cb.active{background:var(--acc);border-color:var(--acc);color:#fff}
.sb-stats{display:flex;border-bottom:1px solid var(--sb-ink3)}
.sb-stat{flex:1;padding:9px 12px;border-right:1px solid var(--sb-ink3)}
.sb-stat:last-child{border-right:none}
.sb-sn{font-family:'Fraunces',serif;font-size:16px;font-weight:300;color:var(--sb-ink);display:block;line-height:1}
.sb-sl{font-size:9px;font-family:'DM Mono',monospace;color:var(--sb-ink3);margin-top:2px;display:block;text-transform:uppercase;letter-spacing:.06em}
.sb-nav{padding:10px;flex:1}
.sb-ns{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sb-ink3);padding:8px 10px 4px}
.sb-ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;font-size:12.5px;color:var(--sb-ink2);cursor:pointer;transition:all .1s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;margin-bottom:1px}
.sb-ni:hover{background:rgba(255,255,255,.06);color:var(--sb-ink)}
.sb-ni.active{background:rgba(255,255,255,.1);color:var(--sb-ink)}
.sb-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.sb-nl{flex:1}
.sb-nd{font-size:10px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:4px;flex-shrink:0}
.sb-nd.ok{background:var(--g-bg);color:var(--g)}.sb-nd.neutral{background:var(--n-bg);color:var(--n)}.sb-nd.warn{background:var(--o-bg);color:var(--o)}.sb-nd.alert{background:var(--r-bg);color:var(--r)}
.sb-sep{border:none;border-top:1px solid var(--sb-ink3);margin:6px 10px}
.sb-ov-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;font-size:12.5px;color:var(--sb-ink2);cursor:pointer;transition:all .1s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.sb-ov-btn:hover{background:rgba(255,255,255,.06);color:var(--sb-ink)}
.sb-ov-btn.active{background:rgba(255,255,255,.1);color:var(--sb-ink)}
.sb-bot{padding:12px 14px 14px;border-top:1px solid var(--sb-ink3);margin-top:auto}
.tbtn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid var(--sb-ink3);border-radius:7px;padding:7px 12px;color:var(--sb-ink2);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;transition:all .1s}
.tbtn:hover{background:rgba(255,255,255,.1);color:var(--sb-ink)}
.main{min-width:0;display:flex;flex-direction:column;background:var(--bg);transition:background .2s}
.topbar{height:var(--th);background:var(--bg);border-bottom:1px solid var(--bd);padding:0 24px;display:flex;align-items:center;gap:4px;position:sticky;top:0;z-index:50;transition:background .2s}
.bci{font-size:13px;color:var(--ink3);cursor:pointer;transition:color .1s;border:none;background:none;font-family:'DM Sans',sans-serif;padding:0}
.bci:hover{color:var(--ink)}.bci.cur{color:var(--ink);font-weight:500;cursor:default}
.bcs{color:var(--ink4);font-size:12px;margin:0 2px}
.page{padding:24px 24px 80px;flex:1}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:10px}
.fc{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px 17px;cursor:pointer;transition:all .12s}
.fc:hover{border-color:var(--bd2);background:var(--card-h);transform:translateY(-1px)}
.fc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.fc-icon{font-size:24px;line-height:1}
.fc-name{font-family:'Fraunces',serif;font-size:16px;font-weight:400;color:var(--ink);letter-spacing:-.2px;margin-bottom:7px}
.fc-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.fc-vol{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3)}
.dc{font-size:11px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:6px;font-weight:500}
.ok{background:var(--g-bg);color:var(--g);border:1px solid var(--g-bd)}.neutral{background:var(--n-bg);color:var(--n);border:1px solid var(--n-bd)}.warn{background:var(--o-bg);color:var(--o);border:1px solid var(--o-bd)}.alert{background:var(--r-bg);color:var(--r);border:1px solid var(--r-bd)}
.bok{background:#3d9a18}.bneutral{background:#9a9068}.bwarn{background:#d47a0a}.balert{background:#c03020}
.fc-bar{width:100%;height:3px;background:var(--bg3);border-radius:2px;margin-top:10px}
.fc-barf{height:100%;border-radius:2px}
.fc-kw{font-size:11px;color:var(--ink4);margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ptitle{font-family:'Fraunces',serif;font-size:28px;font-weight:400;letter-spacing:-.4px;color:var(--ink);line-height:1.1}
.sf-list{display:flex;flex-direction:column;gap:7px;max-width:820px}
.sfi{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 15px;cursor:pointer;transition:all .1s;display:flex;align-items:center;gap:12px}
.sfi:hover{border-color:var(--bd2);background:var(--card-h)}
.sfbv{width:4px;height:34px;background:var(--bg3);border-radius:2px;flex-shrink:0;overflow:hidden;position:relative}
.sfbvf{position:absolute;bottom:0;left:0;width:100%;border-radius:2px}
.sfb{flex:1;min-width:0}.sfn{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:3px}
.sfm{display:flex;align-items:center;gap:8px;font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3)}
.sfr{display:flex;align-items:center;gap:7px;flex-shrink:0}
.sfdc{font-size:11px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:6px;font-weight:500}
.sfarr{color:var(--ink4);font-size:14px}
.krow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.kb{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 15px;min-width:85px;text-align:center}
.kn{font-family:'Fraunces',serif;font-size:21px;font-weight:300;line-height:1}
.kl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink4);margin-top:3px}
.detail-2col{display:grid;grid-template-columns:1fr 380px;gap:12px}
.detail-col{display:flex;flex-direction:column;gap:10px}
.blk{background:var(--card);border:1px solid var(--bd);border-radius:11px;overflow:hidden}
.bh{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bd);background:var(--bg2)}
.bhdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.bhdot.t{background:#2563a8}.bhdot.a{background:var(--r)}.bhdot.tr{background:var(--b)}
.bhtit{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink2)}
.bhct{margin-left:auto;font-size:11px;font-family:'DM Mono',monospace;color:var(--ink4)}
.colh{display:grid;grid-template-columns:1fr 96px 58px 44px;gap:0;padding:5px 14px;font-size:9px;font-family:'DM Mono',monospace;color:var(--ink4);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd)}
.tr{display:grid;grid-template-columns:1fr 96px 58px 44px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--bd);transition:background .08s}
.tr:last-child{border-bottom:none}.tr:hover{background:var(--bg2)}
.tn{font-size:12.5px;font-weight:500;color:var(--ink)}
.tn.red{color:var(--r)}
.vc{display:flex;align-items:center;gap:5px}
.vn{font-size:12px;font-family:'DM Mono',monospace;color:var(--ink2);width:30px;text-align:right;flex-shrink:0}
.vev{font-size:10px;font-family:'DM Mono',monospace;width:36px;flex-shrink:0}
.eu{color:var(--g)}.ed{color:var(--r)}.ef{color:var(--ink4)}
.dcc{display:flex;align-items:center;gap:4px}
.dbar{width:30px;height:4px;background:var(--bg3);border-radius:2px;flex-shrink:0}
.dbarf{height:100%;border-radius:2px}
.dpct{font-size:11px;font-family:'DM Mono',monospace;width:25px;flex-shrink:0}
.ccv{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);text-align:right}
.tr-trend{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bd)}
.tr-trend:last-child{border-bottom:none}.tr-trend:hover{background:var(--bg2)}
.tr-trend-dot{width:6px;height:6px;border-radius:50%;background:var(--b);flex-shrink:0}
.tr-trend-name{font-size:12.5px;font-weight:500;color:var(--b);flex:1}
.tr-trend-meta{font-size:11px;font-family:'DM Mono',monospace;color:var(--b);opacity:.6;display:flex;gap:8px}
.nr-info{background:var(--bg2);border:1px solid var(--bd);border-radius:11px;padding:16px;text-align:center;color:var(--ink3);font-size:12px}
.ov-home-card{background:var(--sb-bg);border-radius:12px;padding:18px 20px;margin-top:28px;cursor:pointer;transition:opacity .1s}
.ov-home-card:hover{opacity:.9}
.ov-hc-label{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,249,245,.3);margin-bottom:8px}
.ov-hc-pct{font-family:'Fraunces',serif;font-size:36px;font-weight:300;color:var(--sb-ink);line-height:1}
.ov-hc-sub{font-size:11px;font-family:'DM Mono',monospace;color:rgba(250,249,245,.35);margin-top:3px}
.ov-hc-prog{width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:12px;overflow:hidden}
.ov-hc-fill{height:100%;border-radius:2px;background:var(--acc)}
.ov-hc-stats{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.ov-hc-stat{font-size:11px;font-family:'DM Mono',monospace;color:rgba(250,249,245,.4)}
.ov-hc-stat strong{color:rgba(250,249,245,.8);font-weight:500}
.ov-hc-cta{font-size:11px;color:rgba(250,249,245,.35);float:right}
.ov-hero{background:var(--sb-bg);border-radius:12px;padding:20px 24px;margin-bottom:20px}
.ov-label{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,249,245,.3);margin-bottom:8px}
.ov-pct{font-family:'Fraunces',serif;font-size:52px;font-weight:300;line-height:1;letter-spacing:-.5px;color:var(--sb-ink)}
.ov-sub{font-size:12px;color:rgba(250,249,245,.35);margin-top:4px;font-family:'DM Mono',monospace}
.ov-prog{width:100%;height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:14px;overflow:hidden}
.ov-prog-fill{height:100%;border-radius:3px;background:var(--acc)}
.ov-sg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.ov-sc{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;text-align:center}
.ov-sn{font-family:'Fraunces',serif;font-size:22px;font-weight:300;color:var(--ink);line-height:1}
.ov-sl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink4);margin-top:3px;line-height:1.3}
.ov-fam-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.ov-fam{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;cursor:pointer;transition:all .1s}
.ov-fam:hover{border-color:var(--bd2);background:var(--card-h)}
.ov-ft{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ov-fn{font-size:13px;font-weight:500;color:var(--ink);flex:1}
.ov-fp{font-size:12px;font-family:'DM Mono',monospace;color:var(--ink3)}
.ov-fb{width:100%;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.ov-fbf{height:100%;border-radius:2px;background:var(--acc)}
.ov-fd{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink4);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.redir-blk{background:var(--card);border:1px solid var(--bd);border-radius:11px;overflow:hidden;margin-bottom:12px}
.redir-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd)}
.redir-row:last-child{border-bottom:none}
.redir-fam{font-size:10px;font-family:'DM Mono',monospace;color:var(--ink4);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.redir-term{font-size:13px;font-weight:500;color:var(--r);flex:1}
.redir-url{font-size:11px;font-family:'DM Mono',monospace;color:var(--b);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.redir-vol{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink4);flex-shrink:0}
.exp-btn{display:inline-flex;align-items:center;gap:6px;background:var(--sb-bg);border:none;border-radius:8px;padding:7px 14px;color:var(--sb-ink);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .1s}
.exp-btn:hover{opacity:.85}
@media(max-width:760px){
  .shell{display:block}.sidebar{display:none}.mhdr{display:flex}
  .topbar{padding:0 14px}.page{padding:14px 14px 80px}
  .fg{grid-template-columns:1fr}.detail-2col{grid-template-columns:1fr}
  .colh,.tr{grid-template-columns:1fr 86px 50px}.ccv{display:none}
  .ov-sg{grid-template-columns:repeat(3,1fr)}
}
.mhdr{display:none;background:var(--sb-bg);padding:calc(env(safe-area-inset-top,0px) + 11px) 15px 11px;position:sticky;top:0;z-index:100;align-items:center;justify-content:space-between}
.mht{font-family:'Fraunces',serif;font-size:17px;font-weight:400;color:var(--sb-ink)}
.mht em{font-style:italic;color:var(--sb-ink2)}
</style>
</head>
<body>
<div class="mhdr">
  <div class="mht">Signal <em>Search</em></div>
  <div style="display:flex;align-items:center;gap:8px">
    <button onclick="toggleTheme()" style="background:none;border:none;color:var(--sb-ink3);cursor:pointer;font-size:14px">&#9681;</button>
  </div>
</div>
<div class="shell">
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-pilot"><span class="sb-pdot"></span>Pilote eMerch &middot; Manutan Group</div>
      <div class="sb-title"><span>Signal</span><br><em>Search</em></div>
      <div class="sb-period" id="sb-period">Avril 2026 &middot; FR</div>
    </div>
    <div class="country-btns">
      <button class="cb active" data-c="FR" onclick="setCountry('FR')">🇫🇷 FR</button>
      <button class="cb" data-c="NL" onclick="setCountry('NL')">🇳🇱 NL</button>
      <button class="cb" data-c="UK" onclick="setCountry('UK')">🇬🇧 UK</button>
    </div>
    <div class="sb-stats">
      <div class="sb-stat"><span class="sb-sn" id="sb-vol">&mdash;</span><span class="sb-sl">recherches</span></div>
      <div class="sb-stat"><span class="sb-sn">8</span><span class="sb-sl">univers</span></div>
    </div>
    <div class="sb-nav"><div class="sb-ns">Univers</div><div id="sb-nav"></div></div>
    <div class="sb-bot">
      <button class="tbtn" onclick="toggleTheme()">
        <span id="th-icon">&#9681;</span><span id="th-label">Mode sombre</span>
      </button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar"><div id="bc" style="display:flex;align-items:center;gap:0"></div></div>
    <div class="page" id="pg"></div>
  </div>

const SK = 'nr_actions_v4';
const COUNTRY_LABELS = {FR:'🇫🇷 France',NL:'🇳🇱 Nederland',UK:'🇬🇧 United Kingdom'};
const PERIOD = {FR:'Avril 2026',NL:'April 2026',UK:'April 2026'};

function dc(d){return d<0.45?'ok':d<=0.5?'neutral':d<=0.6?'warn':'alert'}
function bc(d){return{ok:'bok',neutral:'bneutral',warn:'bwarn',alert:'balert'}[dc(d)]}
function chip(d){return '<span class="dc '+dc(d)+'">'+(d*100).toFixed(1)+'%</span>'}
function ev(p){if(Math.abs(p)<0.05)return '<span class="ef">—</span>';return '<span class="'+(p>0?'eu':'ed')+'">'+(p>0?'+':'')+(p*100).toFixed(0)+'%</span>'}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

function loadA(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}}
function saveA(a){localStorage.setItem(SK,JSON.stringify(a))}
function setAction(key,field,val){
  const a=loadA();
  if(!a[key])a[key]={status:'',url:''};
  a[key][field]=val;
  if(!a[key].status&&!a[key].url)delete a[key];
  saveA(a);buildNav();
  if(S.lv==='sf')sfView(S.fam,S.sf);
}
function setUrl(key,val){
  const a=loadA();if(!a[key])a[key]={status:'redirection',url:''};
  a[key].url=val;saveA(a);buildNav();
}
function treatPct(country){
  const a=loadA(),D=MDATA[country];
  let total=0,treated=0;
  for(const[fn,fd] of Object.entries(D))
    for(const[sfn,sf] of Object.entries(fd.subfams||{}))
      for(const t of (sf.terms||[]).filter(t=>t.v<10)){}; // no NR in new data
  // Since no NR file this time, return placeholder
  const keys=Object.keys(a).filter(k=>k.startsWith(country+'::'));
  return{pct:keys.length>0?Math.min(100,Math.round(keys.length/10)):0,treated:keys.length,total:Math.max(keys.length,10)};
}

let S={lv:'home',fam:null,sf:null,country:'FR'}

function setCountry(c){S.country=c;S.lv='home';S.fam=null;S.sf=null;buildNav();home();}

function D(){return MDATA[S.country]||{}}

function buildNav(){
  const d=D();
  const tv=Object.values(d).reduce((s,f)=>s+f.v,0);
  document.getElementById('sb-vol').textContent=tv.toLocaleString('fr');
  document.getElementById('sb-period').textContent=PERIOD[S.country]+' · '+S.country;

  // Country buttons
  document.querySelectorAll('.cb').forEach(el=>el.classList.toggle('active',el.dataset.c===S.country));

  document.getElementById('sb-nav').innerHTML=
    Object.entries(d).map(([fn,fd])=>'<button class="sb-ni'+(S.fam===fn&&S.lv!=='ov'?' active':'')+'" onclick="gF(\''+esc(fn)+'\')">'
      +'<span class="sb-icon">'+fd.icon+'</span><span class="sb-nl">'+fn+'</span>'
      +'<span class="sb-nd '+dc(fd.d)+'">'+(fd.d*100).toFixed(0)+'%</span></button>').join('')
    +'<hr class="sb-sep">'
    +'<button class="sb-ov-btn'+(S.lv==='ov'?' active':'')+'" onclick="showOv()">'
    +'<span class="sb-icon">◎</span><span class="sb-nl">Suivi actions</span>'
    +'<span style="font-size:10px;font-family:\'DM Mono\',monospace;background:var(--r-bg);color:var(--r);padding:2px 6px;border-radius:4px;flex-shrink:0" id="ov-badge">0</span>'
    +'</button>';
  const nActions=Object.keys(loadA()).filter(k=>k.startsWith(S.country+'::')).length;
  const badge=document.getElementById('ov-badge');
  if(badge)badge.textContent=nActions;
}

function bc_set(parts){
  document.getElementById('bc').innerHTML=parts.map((p,i)=>{
    const last=i===parts.length-1;
    if(last)return '<span class="bci cur">'+p.l+'</span>';
    return '<button class="bci" onclick="'+p.a+'">'+p.l+'</button><span class="bcs">›</span>';
  }).join('');
}

function home(){
  S.lv='home';S.fam=null;S.sf=null;buildNav();
  bc_set([{l:COUNTRY_LABELS[S.country]}]);
  const d=D();
  const a=loadA();
  const nActions=Object.keys(a).filter(k=>k.startsWith(S.country+'::')).length;
  const statLabels={referencer:'À référencer',redirection:'Redirection',etudier:'À étudier',synonyme:'Synonyme',ignore:'Ignoré'};
  const byStat={referencer:0,redirection:0,etudier:0,synonyme:0,ignore:0};
  Object.entries(a).filter(([k])=>k.startsWith(S.country+'::')).forEach(([k,v])=>{if(v.status)byStat[v.status]=(byStat[v.status]||0)+1});
  const statsHtml=Object.entries(byStat).filter(([k,v])=>v>0).map(([k,v])=>'<span class="ov-hc-stat">'+statLabels[k]+' <strong>'+v+'</strong></span>').join('');

  const famHtml=Object.entries(d).map(([fn,fd])=>'<div class="fc" onclick="gF(\''+esc(fn)+'\')">'
    +'<div class="fc-top"><div class="fc-icon">'+fd.icon+'</div></div>'
    +'<div class="fc-name">'+fn+'</div>'
    +'<div class="fc-row"><span class="fc-vol">'+fd.v.toLocaleString('fr')+' rech.</span>'+chip(fd.d)+'</div>'
    +'<div class="fc-kw">'+fd.top_terms.join(' · ')+'</div>'
    +'<div class="fc-bar"><div class="fc-barf '+bc(fd.d)+'" style="width:'+Math.round(fd.d*100)+'%"></div></div>'
    +'</div>').join('');

  document.getElementById('pg').innerHTML=
    '<div style="margin-bottom:20px">'
    +'<div class="ptitle" style="font-size:24px;margin-bottom:3px">'+COUNTRY_LABELS[S.country]+'</div>'
    +'<div style="font-size:11px;font-family:\'DM Mono\',monospace;color:var(--ink3)">'+PERIOD[S.country]+' · 8 familles</div></div>'
    +'<div class="fg">'+famHtml+'</div>'
    +'<div class="ov-home-card" onclick="showOv()">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">'
    +'<div><div class="ov-hc-label">Suivi des actions no result</div>'
    +'<div class="ov-hc-pct">'+nActions+'</div>'
    +'<div class="ov-hc-sub">actions saisies · '+S.country+' '+PERIOD[S.country]+'</div></div>'
    +'<span class="ov-hc-cta">Voir le suivi →</span></div>'
    +(statsHtml?'<div class="ov-hc-stats">'+statsHtml+'</div>':'<div style="font-size:11px;color:rgba(250,249,245,.25)">Aucune action saisie pour l\'instant — ouvrez une sous-famille pour commencer.</div>')
    +'</div>';
}

    +'<div class="dcc"><div class="dbar"><div class="dbarf '+bc(t.d)+'" style="width:'+Math.round(t.d*100)+'%"></div></div>'
    +'<span class="dpct" style="color:'+(t.d>=0.6?'var(--r)':t.d>=0.5?'var(--o)':t.d<0.45?'var(--g)':'var(--ink3)')+'">'+Math.round(t.d*100)+'%</span></div>'
    +'<div class="ccv">'+(t.cr*100).toFixed(1)+'%</div></div>';

  const trendRow=t=>'<div class="tr-trend"><span class="tr-trend-dot"></span>'
    +'<span class="tr-trend-name">'+t.t+'</span>'
    +'<div class="tr-trend-meta"><span>'+t.v+' rech.</span><span>+'+(t.pct*100).toFixed(0)+'% vs N-1</span></div></div>';

  const normalBlk=normalTerms.length?'<div class="blk"><div class="bh"><span class="bhdot t"></span><span class="bhtit">Termes de recherche</span><span class="bhct">'+normalTerms.length+'</span></div>'
    +'<div class="colh"><span>Terme</span><span style="text-align:right">Vol. &nbsp;N-1</span><span>Dispersion</span><span style="text-align:right">Conv.</span></div>'
    +normalTerms.map(t=>tRow(t)).join('')+'</div>':'';

  const alertBlk=alertTerms.length?'<div class="blk"><div class="bh"><span class="bhdot a"></span><span class="bhtit">Forte dispersion · \u00c0 surveiller</span><span class="bhct">'+alertTerms.length+'</span></div>'
    +'<div class="colh"><span>Terme</span><span style="text-align:right">Vol. &nbsp;N-1</span><span>Dispersion</span><span style="text-align:right">Conv.</span></div>'
    +alertTerms.map(t=>tRow(t,'red')).join('')+'</div>':'';

  const trendBlk=trendTerms.length?'<div class="blk"><div class="bh" style="background:var(--b-bg)"><span class="bhdot tr"></span><span class="bhtit" style="color:var(--b)">Tendances · Hausse volume</span><span class="bhct">'+trendTerms.length+'</span></div>'
    +trendTerms.map(t=>trendRow(t)).join('')+'</div>':'';

  // No result — action form (no NR file for these exports, show note)
  const nrInfoBlk='<div class="nr-info">'
    +'<div style="font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--r);margin-bottom:6px">No result</div>'
    +'<div style="font-size:12px;color:var(--ink3)">Pas de fichier no result importé pour '+S.country+'.<br>Ajoutez le fichier no_result_'+S.country+'.csv pour activer cette section.</div>'
    +'</div>';

  document.getElementById('pg').innerHTML=
    '<div style="margin-bottom:20px"><div style="font-size:11px;font-family:\'DM Mono\',monospace;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">'+fd.icon+' '+fn+'</div>'
    +'<div class="ptitle">'+sfn+'</div></div>'
    +'<div class="krow">'
    +'<div class="kb"><div class="kn">'+sf.v.toLocaleString('fr')+'</div><div class="kl">Recherches</div></div>'
    +'<div class="kb" style="border-color:'+(sf.d>=0.6?'var(--r-bd)':sf.d>=0.5?'var(--o-bd)':sf.d<0.45?'var(--g-bd)':'var(--bd)')+'"><div class="kn" style="color:'+(sf.d>=0.6?'var(--r)':sf.d>=0.5?'var(--o)':sf.d<0.45?'var(--g)':'var(--ink)')+'">'+((sf.d)*100).toFixed(1)+'%</div><div class="kl">Dispersion</div></div>'
    +(alertTerms.length?'<div class="kb" style="border-color:var(--r-bd)"><div class="kn" style="color:var(--r)">'+alertTerms.length+'</div><div class="kl">Alertes</div></div>':'')
    +(trendTerms.length?'<div class="kb" style="border-color:var(--b-bd)"><div class="kn" style="color:var(--b)">'+trendTerms.length+'</div><div class="kl">Tendances</div></div>':'')
    +'</div>'
    +'<div class="detail-2col">'
    +'<div class="detail-col">'+normalBlk+alertBlk+trendBlk+'</div>'
    +'<div>'+nrInfoBlk+'</div></div>';
}

function showOv(){
  S.lv='ov';S.fam=null;S.sf=null;buildNav();
  bc_set([{l:COUNTRY_LABELS[S.country],a:'home()'},{l:'Suivi actions'}]);
  const a=loadA();
  const cActions=Object.entries(a).filter(([k])=>k.startsWith(S.country+'::'));
  const byStat={referencer:0,redirection:0,etudier:0,synonyme:0,ignore:0};
  cActions.forEach(([k,v])=>{if(v.status)byStat[v.status]=(byStat[v.status]||0)+1});
  const statLabels={referencer:'À référencer',redirection:'Redirection',etudier:'À étudier',synonyme:'Synonyme à créer',ignore:'Ignoré'};
  const redirs=cActions.filter(([k,v])=>v.status==='redirection').map(([k,v])=>{
    const parts=k.split('::');return{country:parts[0],fam:parts[1],sf:parts[2],term:parts[3]||'',url:v.url||'',v:0};
  });

  document.getElementById('pg').innerHTML=
    '<div class="ov-hero"><div class="ov-label">Suivi des actions · '+S.country+'</div>'
    +'<div class="ov-pct">'+cActions.length+'</div>'
    +'<div class="ov-sub">actions saisies · '+PERIOD[S.country]+'</div></div>'
    +'<div class="ov-sg">'
    +Object.entries(byStat).map(([k,v])=>'<div class="ov-sc"><div class="ov-sn">'+v+'</div><div class="ov-sl">'+statLabels[k]+'</div></div>').join('')
    +'</div>'
    +(redirs.length?'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      +'<div style="font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3)">Redirections à faire ('+redirs.length+')</div>'
      +'<button class="exp-btn" onclick="exportCSV()">&#11015; Exporter CSV</button></div>'
      +'<div class="redir-blk">'
      +redirs.map(r=>'<div class="redir-row">'
        +'<span class="redir-fam">'+r.sf+'</span>'
        +'<span class="redir-term">'+r.term+'</span>'
        +(r.url?'<span class="redir-url">&#8594; '+r.url+'</span>':'<span style="font-size:11px;font-style:italic;color:var(--ink4)">URL non renseign&eacute;e</span>')
        +'</div>').join('')+'</div>'
      :'<div style="padding:2rem;text-align:center;color:var(--ink3);font-size:13px">Aucune action saisie pour '+S.country+' pour l\'instant.</div>');
}

function exportCSV(){
  const a=loadA();
  const redirs=Object.entries(a).filter(([k,v])=>k.startsWith(S.country+'::')&&v.status==='redirection');
  const rows=[['Pays','Famille','Sous-famille','Terme','URL cible']];
  redirs.forEach(([k,v])=>{const p=k.split('::');rows.push([p[0],p[1],p[2],p[3]||'',v.url||''])});
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a2=document.createElement('a');a2.href=url;a2.download='redirections_'+S.country+'_'+new Date().toISOString().split('T')[0]+'.csv';a2.click();URL.revokeObjectURL(url);
}

function toggleTheme(){
  const h=document.documentElement,dark=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('th-icon').textContent=dark?'◑':'○';
  document.getElementById('th-label').textContent=dark?'Mode sombre':'Mode clair';
}

function gF(fn){famView(fn);window.scrollTo(0,0)}
function gSf(fn,sfn){sfView(fn,sfn);window.scrollTo(0,0)}
window.home=home;window.gF=gF;window.gSf=gSf;window.showOv=showOv;
window.setCountry=setCountry;window.toggleTheme=toggleTheme;
window.setAction=setAction;window.setUrl=setUrl;window.exportCSV=exportCSV;
home();
</script>
</body>
