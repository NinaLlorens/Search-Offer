<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Signal Search · Catman · Manutan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --w:#faf9f5; --w2:#f2f0e8; --w3:#e8e4d8; --w4:#d4d0c0;
  --k:#1a1a14; --k2:#48483a; --k3:#7a7a68; --k4:#adad94;
  --bd:rgba(26,26,20,.07); --bd2:rgba(26,26,20,.13);
  --r:10px; --rl:14px; --rxl:20px;
  --ok:#1e5c00; --ok-bg:#e8f5e0; --ok-bd:rgba(30,92,0,.15);
  --warn:#7a4a00; --warn-bg:#fff3e0; --warn-bd:rgba(122,74,0,.18);
  --alert:#7a1010; --alert-bg:#fdecea; --alert-bd:rgba(122,16,16,.18);
  --trend:#004a7a; --trend-bg:#e4f0fc; --trend-bd:rgba(0,74,122,.18);
  --accent:#c84800;
}
html{background:var(--k);font-size:15px;color:var(--k);-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--w);min-height:100vh;max-width:480px;margin:0 auto;background:var(--k);position:relative}

/* ── STATUS BAR ── */
.status-zone{height:env(safe-area-inset-top,0px);background:var(--k)}

/* ── APP HEADER ── */
.app-header{
  background:var(--k);
  padding:16px 20px 18px;
  position:sticky;top:env(safe-area-inset-top,0);
  z-index:100;
}
.ah-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ah-brand{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,249,245,.35)}
.ah-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:6px}
.ah-title{font-family:'Fraunces',serif;font-size:22px;font-weight:400;color:var(--w);line-height:1.1;letter-spacing:-.3px}
.ah-title em{font-style:italic;color:rgba(250,249,245,.5)}
.ah-tabs{display:flex;gap:4px;background:rgba(255,255,255,.06);border-radius:999px;padding:3px}
.ah-tab{padding:5px 14px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;color:rgba(250,249,245,.45);border:none;background:none;transition:all .15s;font-family:'DM Sans',sans-serif}
.ah-tab.active{background:var(--w);color:var(--k);font-weight:600}

/* ── CONTENT ── */
.content{background:var(--w);border-radius:24px 24px 0 0;min-height:calc(100vh - 120px);padding:0 0 80px;overflow:hidden}

/* ── FAMILY LIST ── */
.section-head{display:flex;align-items:baseline;justify-content:space-between;padding:20px 20px 12px}
.sh-title{font-family:'Fraunces',serif;font-size:17px;font-weight:400;color:var(--k)}
.sh-sub{font-size:11px;font-family:'DM Mono',monospace;color:var(--k3)}

.fam-list{padding:0 12px;display:flex;flex-direction:column;gap:8px}
.fam-card{
  background:var(--w);border:1px solid var(--bd);border-radius:var(--rl);
  padding:14px 16px;cursor:pointer;transition:all .12s;
  display:flex;align-items:center;gap:14px;
}
.fam-card:hover,.fam-card:active{background:var(--w2);border-color:var(--bd2)}
.fam-icon{font-size:24px;width:44px;height:44px;background:var(--w2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fam-body{flex:1;min-width:0}
.fam-name{font-size:14px;font-weight:600;color:var(--k);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.fam-meta{font-size:11px;color:var(--k3);display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace}
.fam-disp{font-weight:500}
.disp-ok{color:var(--ok)}
.disp-warn{color:var(--warn)}
.disp-alert{color:var(--alert)}
.fam-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.fam-arrow{font-size:14px;color:var(--k4)}
.fam-nr{font-size:10px;font-family:'DM Mono',monospace;background:var(--alert-bg);color:var(--alert);padding:2px 7px;border-radius:999px;font-weight:500}
.fam-trend{font-size:10px;font-family:'DM Mono',monospace;background:var(--trend-bg);color:var(--trend);padding:2px 7px;border-radius:999px;display:flex;align-items:center;gap:3px}

/* ── SUBFAMILY LIST ── */
.back-btn{display:flex;align-items:center;gap:8px;padding:16px 20px 0;cursor:pointer;color:var(--k3);font-size:13px;border:none;background:none;font-family:'DM Sans',sans-serif}
.back-btn:hover{color:var(--k)}

.fam-hero{padding:16px 20px 0}
.fh-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--k3);margin-bottom:6px}
.fh-name{font-family:'Fraunces',serif;font-size:24px;font-weight:400;color:var(--k);letter-spacing:-.3px;line-height:1.1;margin-bottom:10px}
.fh-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.fh-kpi{background:var(--w2);border-radius:var(--r);padding:10px 12px}
.fhk-n{font-family:'Fraunces',serif;font-size:20px;font-weight:300;color:var(--k);line-height:1}
.fhk-l{font-size:10px;color:var(--k3);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.fhk-accent .fhk-n{color:var(--accent)}

.sf-list{padding:0 12px;display:flex;flex-direction:column;gap:6px}
.sf-card{
  background:var(--w);border:1px solid var(--bd);border-radius:var(--r);
  padding:12px 14px;cursor:pointer;transition:all .12s;
  display:flex;align-items:center;gap:12px;
}
.sf-card:hover,.sf-card:active{background:var(--w2)}
.sf-body{flex:1;min-width:0}
.sf-name{font-size:13px;font-weight:500;color:var(--k);margin-bottom:2px}
.sf-meta{font-size:11px;color:var(--k3);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:6px}
.sf-bar{width:60px;height:4px;background:var(--w3);border-radius:2px;flex-shrink:0}
.sf-bar-fill{height:100%;border-radius:2px;background:var(--warn)}
.sf-bar-fill.ok{background:var(--ok)}
.sf-bar-fill.alert{background:var(--alert)}

/* ── SUBFAM DETAIL ── */
.sf-detail{padding:0 16px}
.sf-detail-back{display:flex;align-items:center;gap:8px;padding:14px 0 4px;cursor:pointer;color:var(--k3);font-size:13px;border:none;background:none;font-family:'DM Sans',sans-serif}
.sf-hero{padding:0 0 16px}
.sfh-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--k3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.sfh-name{font-family:'Fraunces',serif;font-size:20px;font-weight:400;color:var(--k);margin-bottom:12px}
.sfh-stats{display:flex;gap:8px}
.sfh-stat{background:var(--w2);border-radius:var(--r);padding:8px 12px;flex:1}
.sfhs-n{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--k);line-height:1}
.sfhs-l{font-size:10px;color:var(--k3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

/* DEMAND SECTIONS */
.demand-section{margin-bottom:16px}
.ds-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px}
.ds-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ds-dot.covered{background:var(--trend)}
.ds-dot.uncovered{background:var(--alert)}
.ds-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--k3)}
.ds-count{font-size:11px;font-family:'DM Mono',monospace;color:var(--k4);margin-left:auto}

.term-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;background:var(--w);border:1px solid var(--bd);
  border-radius:var(--r);margin-bottom:5px;
}
.term-name{font-size:13px;font-weight:500;color:var(--k);flex:1;min-width:0}
.term-vol{font-size:11px;font-family:'DM Mono',monospace;color:var(--k3);flex-shrink:0}
.term-bar-wrap{width:50px;flex-shrink:0}
.term-bar{height:3px;background:var(--w3);border-radius:2px}
.term-bar-fill{height:100%;border-radius:2px}
.tbd-ok{background:#60a830}
.tbd-warn{background:#d4880a}
.tbd-alert{background:#c03020}
.term-pct{font-size:11px;font-family:'DM Mono',monospace;width:34px;text-align:right;flex-shrink:0}
.pct-up{color:var(--ok)}
.pct-dn{color:var(--alert)}
.pct-flat{color:var(--k4)}

.nr-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:var(--r);margin-bottom:4px;
  background:var(--alert-bg);border:1px solid var(--alert-bd);
}
.nr-icon{font-size:12px;color:var(--alert);flex-shrink:0}
.nr-name{font-size:12.5px;color:var(--alert);font-style:italic;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nr-vol{font-size:11px;font-family:'DM Mono',monospace;color:var(--alert);flex-shrink:0;opacity:.7}

/* CATMAN SIGNALS */
.signals-block{
  background:var(--k);border-radius:var(--rl);
  padding:14px 16px;margin-bottom:16px;
}
.sb-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sb-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,249,245,.35)}
.sb-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);display:block;margin-left:8px}
.signal-item{margin-bottom:8px}
.signal-item:last-child{margin-bottom:0}
.sig-text{font-size:12.5px;line-height:1.6;color:rgba(250,249,245,.8);font-weight:300;padding:10px 12px;background:rgba(255,255,255,.05);border-radius:var(--r);border-left:2px solid rgba(250,249,245,.15)}
.sig-text strong{font-weight:600;color:var(--w)}
.sig-trend{border-left-color:rgba(200,72,0,.7);background:rgba(200,72,0,.08)}

.sig-loading{display:flex;align-items:center;gap:8px;color:rgba(250,249,245,.3);font-size:12px;padding:8px 0}
.sig-ld-dot{width:5px;height:5px;border-radius:50%;background:rgba(250,249,245,.3);animation:blink 1.2s ease infinite}
.sig-ld-dot:nth-child(2){animation-delay:.2s}
.sig-ld-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

/* EMPTY */
.empty-msg{text-align:center;padding:2rem;color:var(--k3);font-size:13px}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:var(--w);border-top:1px solid var(--bd);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));
  display:flex;z-index:200;
}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;border:none;background:none;-webkit-tap-highlight-color:transparent}
.bn-icon{font-size:19px;line-height:1}
.bn-label{font-size:10px;font-weight:500;color:var(--k3)}
.bn-item.active .bn-label{color:var(--k)}
.bn-item.active .bn-icon{transform:scale(1.1)}

/* TABS content */
.tab-pane{display:none}
.tab-pane.active{display:block}

/* Scroll hint */
.more-hint{text-align:center;padding:8px 0 4px;font-size:11px;color:var(--k4);font-family:'DM Mono',monospace}
</style>
</head>
<body>

<div class="status-zone"></div>

<div class="app-header">
  <div class="ah-row1">
    <div>
      <div class="ah-brand"><span class="ah-dot"></span>Manutan FR · Avril 2026</div>
      <div class="ah-title">Signal<br><em>Search</em></div>
    </div>
    <div>
      <div style="font-size:11px;color:rgba(250,249,245,.3);font-family:'DM Mono',monospace;text-align:right;margin-bottom:6px">catman</div>
      <div style="font-size:11px;color:rgba(250,249,245,.45);font-family:'DM Mono',monospace;line-height:1.6">
        <span id="total-vol" style="color:rgba(250,249,245,.7);font-weight:500">—</span> rech.<br>
        <span id="total-fam" style="color:rgba(250,249,245,.7);font-weight:500">—</span> familles
      </div>
    </div>
  </div>
  <div class="ah-tabs">
    <button class="ah-tab active" id="tab-btn-familles" onclick="showTab('familles')">Univers</button>
    <button class="ah-tab" id="tab-btn-alertes" onclick="showTab('alertes')">Alertes</button>
    <button class="ah-tab" id="tab-btn-tendances" onclick="showTab('tendances')">Tendances</button>
  </div>
</div>

<div class="content">

  <!-- TAB: FAMILLES -->
  <div class="tab-pane active" id="tab-familles">
    <div id="view-families">
      <div class="section-head">
        <span class="sh-title">Vos univers</span>
        <span class="sh-sub" id="fam-count-label">—</span>
      </div>
      <div class="fam-list" id="fam-list"></div>
    </div>

    <div id="view-subfamilies" style="display:none">
      <button class="back-btn" onclick="showFamilies()">← Retour</button>
      <div class="fam-hero" id="fam-hero"></div>
      <div class="sf-list" id="sf-list"></div>
    </div>

    <div id="view-detail" style="display:none">
      <div class="sf-detail">
        <button class="sf-detail-back" id="detail-back-btn">← <span id="detail-back-label">Retour</span></button>
        <div class="sf-hero" id="sf-hero"></div>
        <div class="signals-block" id="signals-block">
          <div class="sb-header">
            <div class="sb-label">Signaux catman</div>
          </div>
          <div class="sig-loading" id="sig-loading">
            <div class="sig-ld-dot"></div><div class="sig-ld-dot"></div><div class="sig-ld-dot"></div>
            <span>Analyse en cours…</span>
          </div>
          <div id="signals-content"></div>
        </div>
        <div id="demand-sections"></div>
      </div>
    </div>
  </div>

  <!-- TAB: ALERTES -->
  <div class="tab-pane" id="tab-alertes">
    <div class="section-head">
      <span class="sh-title">Trous d'offre</span>
      <span class="sh-sub" id="alert-count-label">—</span>
    </div>
    <div id="alert-list" style="padding:0 12px"></div>
  </div>

  <!-- TAB: TENDANCES -->
  <div class="tab-pane" id="tab-tendances">
    <div class="section-head">
      <span class="sh-title">Signaux de croissance</span>
      <span class="sh-sub" id="trend-count-label">—</span>
    </div>
    <div id="trend-list" style="padding:0 12px"></div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="bn-item active" id="bn-univers" onclick="switchNav('univers')">
    <span class="bn-icon">◈</span>
    <span class="bn-label">Univers</span>
  </button>
  <button class="bn-item" id="bn-alertes" onclick="switchNav('alertes')">
    <span class="bn-icon">⚑</span>
    <span class="bn-label">Alertes</span>
  </button>
  <button class="bn-item" id="bn-tendances" onclick="switchNav('tendances')">
    <span class="bn-icon">↑</span>
    <span class="bn-label">Tendances</span>
  </button>
</nav>

// ── STATE ──────────────────────────────────────────────────────────────────────
let state = {
  view: 'families', // families | subfamilies | detail
  tab: 'familles',
  currentFam: null,
  currentSf: null,
  signals: {}
};

// ── UTILS ──────────────────────────────────────────────────────────────────────
const pct = (v, compact) => {
  if (v == null) return '—';
  const s = `${v > 0 ? '+' : ''}${(v * 100).toFixed(compact ? 0 : 1)}%`;
  return s;
};
const dispColor = d => d >= 0.60 ? 'disp-alert' : d >= 0.48 ? 'disp-warn' : 'disp-ok';
const barColor = d => d >= 0.60 ? 'alert' : d >= 0.48 ? '' : 'ok';
const termBarColor = d => d >= 0.60 ? 'tbd-alert' : d >= 0.45 ? 'tbd-warn' : 'tbd-ok';

function totalVol() { return Object.values(DATA).reduce((s,f) => s + f.v, 0); }
function totalNR() { return Object.values(DATA).reduce((s,f) => s + f.nr_total, 0); }

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  const tv = totalVol();
  document.getElementById('total-vol').textContent = tv.toLocaleString('fr');
  document.getElementById('total-fam').textContent = Object.keys(DATA).length;
  renderFamilies();
  renderAlerts();
  renderTrends();
}

// ── FAMILIES VIEW ──────────────────────────────────────────────────────────────
function renderFamilies() {
  const fams = Object.entries(DATA).sort((a,b) => b[1].v - a[1].v);
  document.getElementById('fam-count-label').textContent = `${fams.length} univers · ${totalVol().toLocaleString('fr')} rech.`;

  const html = fams.map(([name, fd]) => {
    const topTrend = Object.values(fd.subfams).filter(sf => sf.trend).sort((a,b)=>b.trend.pct - a.trend.pct)[0];
    return `<div class="fam-card" onclick="openFamily('${name.replace(/'/g,"\\'")}')">
      <div class="fam-icon">${fd.icon}</div>
      <div class="fam-body">
        <div class="fam-name">${name}</div>
        <div class="fam-meta">
          <span>${fd.v.toLocaleString('fr')} rech.</span>
          <span>·</span>
          <span class="fam-disp ${dispColor(fd.d)}">${(fd.d*100).toFixed(1)}% disp.</span>
        </div>
      </div>
      <div class="fam-right">
        <span class="fam-arrow">›</span>
        ${fd.nr_total > 0 ? `<span class="fam-nr">⊘ ${fd.nr_total} non couverts</span>` : ''}
        ${topTrend ? `<span class="fam-trend">↑ ${topTrend.trend.t}</span>` : ''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('fam-list').innerHTML = html;
}

function openFamily(name) {
  state.currentFam = name;
  state.view = 'subfamilies';
  renderSubfamilies(name);
  document.getElementById('view-families').style.display = 'none';
  document.getElementById('view-subfamilies').style.display = 'block';
  document.getElementById('view-detail').style.display = 'none';
  window.scrollTo(0,0);
}

function showFamilies() {
  state.view = 'families';
  document.getElementById('view-families').style.display = 'block';
  document.getElementById('view-subfamilies').style.display = 'none';
  document.getElementById('view-detail').style.display = 'none';
}

// ── SUBFAMILIES VIEW ──────────────────────────────────────────────────────────
function renderSubfamilies(famName) {
  const fd = DATA[famName];
  const totalSfVol = Object.values(fd.subfams).reduce((s,sf)=>s+sf.v,0);

  document.getElementById('fam-hero').innerHTML = `
    <div class="fh-tag">${fd.icon} ${famName}</div>
    <div class="fh-name">${famName}</div>
    <div class="fh-kpis">
      <div class="fh-kpi">
        <div class="fhk-n">${fd.v.toLocaleString('fr')}</div>
        <div class="fhk-l">Recherches</div>
      </div>
      <div class="fh-kpi fhk-accent">
        <div class="fhk-n">${(fd.d*100).toFixed(1)}%</div>
        <div class="fhk-l">Dispersion</div>
      </div>
      <div class="fh-kpi">
        <div class="fhk-n">${fd.nr_total}</div>
        <div class="fhk-l">Non couverts</div>
      </div>
    </div>
  `;

  const sfHtml = Object.entries(fd.subfams).sort((a,b)=>b[1].v-a[1].v).map(([sfName, sf]) => {
    const fillPct = Math.min(sf.d * 100, 100);
    const bc = barColor(sf.d);
    return `<div class="sf-card" onclick="openDetail('${famName.replace(/'/g,"\\'")}','${sfName.replace(/'/g,"\\'")}')">
      <div class="sf-bar">
        <div class="sf-bar-fill ${bc}" style="width:${fillPct}%"></div>
      </div>
      <div class="sf-body">
        <div class="sf-name">${sfName}</div>
        <div class="sf-meta">
          <span>${sf.v.toLocaleString('fr')} rech.</span>
          <span>·</span>
          <span class="${dispColor(sf.d)}">${(sf.d*100).toFixed(1)}%</span>
          ${sf.nr.length > 0 ? `<span>· <span style="color:var(--alert)">⊘ ${sf.nr.length}</span></span>` : ''}
        </div>
      </div>
      ${sf.trend ? `<span style="font-size:11px;color:var(--trend);font-family:'DM Mono',monospace">↑ ${pct(sf.trend.pct,true)}</span>` : ''}
      <span style="color:var(--k4);font-size:14px">›</span>
    </div>`;
  }).join('');

  document.getElementById('sf-list').innerHTML = sfHtml;
}

// ── DETAIL VIEW ───────────────────────────────────────────────────────────────
function openDetail(famName, sfName) {
  state.currentFam = famName;
  state.currentSf = sfName;
  state.view = 'detail';

  document.getElementById('view-families').style.display = 'none';
  document.getElementById('view-subfamilies').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';

  document.getElementById('detail-back-btn').onclick = () => openFamily(famName);
  document.getElementById('detail-back-label').textContent = famName;

  renderDetail(famName, sfName);
  window.scrollTo(0,0);
}

function renderDetail(famName, sfName) {
  const sf = DATA[famName].subfams[sfName];
  const icon = DATA[famName].icon;

  // Hero
  document.getElementById('sf-hero').innerHTML = `
    <div class="sfh-label">${icon} ${famName}</div>
    <div class="sfh-name">${sfName}</div>
    <div class="sfh-stats">
      <div class="sfh-stat">
        <div class="sfhs-n">${sf.v.toLocaleString('fr')}</div>
        <div class="sfhs-l">Recherches</div>
      </div>
      <div class="sfh-stat">
        <div class="sfhs-n" style="color:${sf.d>=0.55?'var(--alert)':sf.d>=0.45?'var(--warn)':'var(--ok)'}">${(sf.d*100).toFixed(1)}%</div>
        <div class="sfhs-l">Dispersion</div>
      </div>
      <div class="sfh-stat">
        <div class="sfhs-n" style="color:var(--alert)">${sf.nr.length}</div>
        <div class="sfhs-l">Non couverts</div>
      </div>
    </div>
  `;

  // Demand sections
  const topTerms = sf.terms.slice(0, 8);
  const maxVol = topTerms[0]?.v || 1;

  const coveredHtml = topTerms.map(t => {
    const barW = Math.round((t.v / maxVol) * 100);
    const pctVal = t.pct;
    const pctClass = pctVal > 0.1 ? 'pct-up' : pctVal < -0.1 ? 'pct-dn' : 'pct-flat';
    return `<div class="term-row">
      <span class="term-name">${t.t}</span>
      <span class="term-vol">${t.v}</span>
      <div class="term-bar-wrap">
        <div class="term-bar"><div class="term-bar-fill ${termBarColor(t.d)}" style="width:${Math.round(t.d*100)}%"></div></div>
        <div style="font-size:9px;color:var(--k4);text-align:right;margin-top:1px;font-family:'DM Mono',monospace">${(t.d*100).toFixed(0)}%</div>
      </div>
      <span class="term-pct ${pctClass}">${pctVal > 0 ? '+' : ''}${(pctVal*100).toFixed(0)}%</span>
    </div>`;
  }).join('');

  const uncoveredHtml = sf.nr.length === 0
    ? `<div class="empty-msg">✓ Aucun terme sans résultat</div>`
    : sf.nr.map(nr => `
      <div class="nr-row">
        <span class="nr-icon">⊘</span>
        <span class="nr-name">${nr.t}</span>
        <span class="nr-vol">${nr.v} rech.</span>
      </div>`).join('');

  document.getElementById('demand-sections').innerHTML = `
    <div class="demand-section">
      <div class="ds-header">
        <span class="ds-dot covered"></span>
        <span class="ds-title">Demande active — termes avec résultats</span>
        <span class="ds-count">${topTerms.length}</span>
      </div>
      <div style="margin-bottom:4px;display:flex;gap:12px;padding:0 2px 6px;font-size:10px;font-family:'DM Mono',monospace;color:var(--k4)">
        <span>terme</span><span style="margin-left:auto">vol · disp% · évol.</span>
      </div>
      ${coveredHtml}
    </div>
    <div class="demand-section">
      <div class="ds-header">
        <span class="ds-dot uncovered"></span>
        <span class="ds-title">Demande non couverte — no result</span>
        <span class="ds-count">${sf.nr.length}</span>
      </div>
      ${uncoveredHtml}
    </div>
  `;

  // Signals
  generateSignals(famName, sfName, sf);
}

async function generateSignals(famName, sfName, sf) {
  const cacheKey = `${famName}::${sfName}`;
  document.getElementById('sig-loading').style.display = 'flex';
  document.getElementById('signals-content').innerHTML = '';

  if (state.signals[cacheKey]) {
    renderSignals(state.signals[cacheKey]);
    return;
  }

  const topTerms = sf.terms.slice(0,6).map(t=>`${t.t} (${t.v} rech, disp ${(t.d*100).toFixed(0)}%, évol ${t.pct>0?'+':''}${(t.pct*100).toFixed(0)}%)`).join('; ');
  const noResult = sf.nr.slice(0,5).map(t=>t.t).join(', ') || 'aucun';
  const trend = sf.trend ? `terme en forte hausse: ${sf.trend.t} (${pct(sf.trend.pct,true)})` : 'aucun signal fort';
  const avgDisp = (sf.d*100).toFixed(1);

  const prompt = `Tu es un catégorie manager B2B en eMerchandising. Analyse ces données search pour la sous-famille "${sfName}" (univers ${famName}) et génère 3 signaux actionnables concis.

Termes principaux: ${topTerms}
Termes sans résultat: ${noResult}
Tendance: ${trend}
Dispersion moy: ${avgDisp}%

Format: 3 signaux courts (1-2 phrases chacun), style catman direct. Commence chaque signal par une observation concrète puis une question ou action. Distingue bien: trous d'offre (no result), problèmes de contenu (dispersion haute), opportunités (croissance). Pas de titre, juste les 3 signaux séparés par des retours à la ligne. Mise en gras pour les termes clés. En français.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:400,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==='text')?.text || '';
    state.signals[cacheKey] = text;
    renderSignals(text);
  } catch(e) {
    renderSignals(buildFallbackSignals(sfName, sf));
  }
}

function buildFallbackSignals(sfName, sf) {
  const lines = [];
  const urgent = sf.terms.filter(t=>t.d>0.6&&t.v>50);
  if (urgent.length) lines.push(`**${urgent[0].t}** (disp. ${(urgent[0].d*100).toFixed(0)}%) : fort volume sans conversion — le contenu produit répond-il à l'intention de recherche ?`);
  if (sf.nr.length > 0) lines.push(`**Demande non couverte** : ${sf.nr.slice(0,2).map(t=>t.t).join(', ')} — ces termes génèrent ${sf.nr.slice(0,2).reduce((s,t)=>s+t.v,0)} recherches sans résultat. L'assortiment couvre-t-il ces besoins ?`);
  if (sf.trend) lines.push(`**${sf.trend.t}** enregistre +${(sf.trend.pct*100).toFixed(0)}% de recherches — signal de montée en demande à surveiller pour le plan d'achat.`);
  if (lines.length < 2) lines.push(`Dispersion moyenne de **${(sf.d*100).toFixed(1)}%** sur ${sfName} — vérifier la cohérence des intitulés produits avec les termes de recherche clients.`);
  return lines.join('\n\n');
}

function renderSignals(text) {
  document.getElementById('sig-loading').style.display = 'none';
  const signals = text.split(/\n\n+/).filter(s=>s.trim().length > 10);
  const isTrend = (s) => s.includes('%') && (s.includes('hausse') || s.includes('croissance') || s.includes('monte') || s.includes('+'));
  const html = signals.slice(0,4).map(sig => {
    const formatted = sig.trim().replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    return `<div class="signal-item"><div class="sig-text ${isTrend(sig)?'sig-trend':''}">${formatted}</div></div>`;
  }).join('');
  document.getElementById('signals-content').innerHTML = html;
}

// ── ALERTS TAB ───────────────────────────────────────────────────────────────
function renderAlerts() {
  const alerts = [];
  for (const [famName, fd] of Object.entries(DATA)) {
    for (const [sfName, sf] of Object.entries(fd.subfams)) {
      if (sf.nr.length > 0) {
        alerts.push({ famName, sfName, icon: fd.icon, nr: sf.nr, sfVol: sf.v });
      }
    }
  }
  alerts.sort((a,b) => b.nr.length - a.nr.length);

  document.getElementById('alert-count-label').textContent = `${alerts.reduce((s,a)=>s+a.nr.length,0)} termes non couverts`;

  const html = alerts.slice(0,20).map(a => `
    <div class="fam-card" style="margin-bottom:8px" onclick="openDetail('${a.famName.replace(/'/g,"\\'")}','${a.sfName.replace(/'/g,"\\'")}')">
      <div class="fam-icon">${a.icon}</div>
      <div class="fam-body">
        <div class="fam-name" style="font-size:13px">${a.sfName}</div>
        <div class="fam-meta" style="font-size:10px;color:var(--k3)">${a.famName}</div>
        <div class="fam-meta" style="margin-top:4px">
          ${a.nr.slice(0,3).map(t=>`<span style="font-size:11px;font-style:italic;color:var(--alert)">${t.t}</span>`).join(' · ')}
        </div>
      </div>
      <div class="fam-right">
        <span class="fam-nr">⊘ ${a.nr.length}</span>
      </div>
    </div>`).join('');

  document.getElementById('alert-list').innerHTML = html;
}

// ── TRENDS TAB ───────────────────────────────────────────────────────────────
function renderTrends() {
  const trends = [];
  for (const [famName, fd] of Object.entries(DATA)) {
    for (const [sfName, sf] of Object.entries(fd.subfams)) {
      if (sf.trend && sf.trend.pct > 0.5) {
        trends.push({ famName, sfName, icon: fd.icon, trend: sf.trend, sfVol: sf.v, d: sf.d });
      }
      // Also pick growing terms
      sf.terms.filter(t=>t.pct>0.8&&t.v>30).forEach(t => {
        trends.push({ famName, sfName, icon: fd.icon, trend: {t:t.t,pct:t.pct}, sfVol: sf.v, d: sf.d, termV: t.v });
      });
    }
  }
  // deduplicate and sort
  const seen = new Set();
  const unique = trends.filter(t => { const k = t.trend.t; if(seen.has(k)) return false; seen.add(k); return true; })
    .sort((a,b) => b.trend.pct - a.trend.pct);

  document.getElementById('trend-count-label').textContent = `${unique.length} signaux détectés`;

  const html = unique.slice(0,25).map(t => `
    <div class="fam-card" style="margin-bottom:8px" onclick="openDetail('${t.famName.replace(/'/g,"\\'")}','${t.sfName.replace(/'/g,"\\'")}')">
      <div class="fam-icon">${t.icon}</div>
      <div class="fam-body">
        <div class="fam-name" style="font-size:13px">${t.trend.t}</div>
        <div class="fam-meta" style="font-size:10px">${t.sfName} · ${t.famName}</div>
      </div>
      <div class="fam-right">
        <span class="fam-trend">↑ ${pct(t.trend.pct,true)}</span>
        <span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--k3)">${(t.d*100).toFixed(0)}% disp.</span>
      </div>
    </div>`).join('');

  document.getElementById('trend-list').innerHTML = html;
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ah-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`tab-btn-${tab}`).classList.add('active');
}

function switchNav(nav) {
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  document.getElementById(`bn-${nav}`).classList.add('active');
  const tabMap = {univers:'familles', alertes:'alertes', tendances:'tendances'};
  showTab(tabMap[nav]);
}

// Expose globals
window.openFamily = openFamily;
window.openDetail = openDetail;
window.showFamilies = showFamilies;
window.showTab = showTab;
window.switchNav = switchNav;

// Boot
init();
